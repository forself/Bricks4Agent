<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebTextEditor Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 24px; background: var(--cl-bg-secondary); }
        h1 { color: var(--cl-text); }
        .demo-section { background: var(--cl-bg); padding: 24px; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .demo-section h2 { margin-top: 0; color: #555; font-size: 16px; }
        .demo-section p { color: #888; font-size: 13px; margin: 4px 0 12px; }
        .toolbar { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
        .toolbar button { padding: 6px 16px; cursor: pointer; border: 1px solid var(--cl-border); border-radius: 4px; background: var(--cl-bg); }
        .toolbar button:hover { border-color: #2196F3; color: #2196F3; }
        #output { font-family: monospace; font-size: 13px; color: var(--cl-text-secondary); margin-top: 12px; white-space: pre-wrap; max-height: 200px; overflow: auto; }
    </style>
    <link rel="stylesheet" href="../../theme.css">
</head>
<body>
    <h1>WebTextEditor Demo</h1>

    <div class="demo-section">
        <h2>富文本編輯器</h2>
        <p>支援格式工具列、搜尋/取代、復原/重做、全螢幕、匯出 PDF/Word/Markdown。</p>
        <div id="editor1"></div>
        <div class="toolbar">
            <button id="btnGet">取得 HTML</button>
            <button id="btnSet">載入範例內容</button>
            <button id="btnUndo">復原</button>
            <button id="btnRedo">重做</button>
        </div>
        <div id="output"></div>
    </div>

    <div class="demo-section">
        <h2>唯讀模式</h2>
        <div id="editor2"></div>
    </div>

    <script type="module">
        import { WebTextEditor } from './WebTextEditor.js';

        const editor1 = new WebTextEditor({
            container: '#editor1',
            placeholder: '在此輸入文字...',
            height: '350px',
            onChange: () => console.log('content changed')
        });

        document.getElementById('btnGet').addEventListener('click', () => {
            const html = editor1.getContent();
            document.getElementById('output').textContent = html;
        });

        document.getElementById('btnSet').addEventListener('click', () => {
            editor1.setContent(`
                <h2>範例文件</h2>
                <p>這是一段<strong>粗體</strong>和<em>斜體</em>的範例文字。</p>
                <ul>
                    <li>項目一</li>
                    <li>項目二</li>
                    <li>項目三</li>
                </ul>
                <p>支援<span style="color:#2196F3">彩色文字</span>和<u>底線</u>。</p>
            `);
        });

        document.getElementById('btnUndo').addEventListener('click', () => editor1.undo());
        document.getElementById('btnRedo').addEventListener('click', () => editor1.redo());

        // 唯讀模式
        new WebTextEditor({
            container: '#editor2',
            height: '200px',
            readOnly: true,
            content: '<h3>唯讀文件</h3><p>此編輯器為唯讀模式，無法編輯內容。適用於文件預覽場景。</p>'
        });
    </script>
    <script type="module">
        import { createThemeToggle } from '../../demo-utils.js';
        createThemeToggle();
    </script>
</body>
</html>
