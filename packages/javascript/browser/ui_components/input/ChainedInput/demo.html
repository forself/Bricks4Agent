<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChainedInput Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 24px; background: var(--cl-bg-secondary); }
        h1 { color: var(--cl-text); }
        .demo-section { background: var(--cl-bg); padding: 24px; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .demo-section h2 { margin-top: 0; color: #555; font-size: 16px; }
        .toolbar { margin-top: 12px; display: flex; gap: 8px; }
        .toolbar button { padding: 6px 16px; cursor: pointer; border: 1px solid var(--cl-border); border-radius: 4px; background: var(--cl-bg); }
        .toolbar button:hover { border-color: #2196F3; color: #2196F3; }
        #output { font-family: monospace; font-size: 13px; color: var(--cl-text-secondary); margin-top: 12px; white-space: pre-wrap; }
    </style>
    <link rel="stylesheet" href="../../theme.css">
</head>
<body>
    <h1>ChainedInput Demo</h1>

    <div class="demo-section">
        <h2>基本用法 — 連鎖式輸入欄位</h2>
        <div id="chained1"></div>
        <div class="toolbar">
            <button id="btnGet">取得值</button>
        </div>
        <div id="output"></div>
    </div>

    <div class="demo-section">
        <h2>垂直排列 + 條件顯示</h2>
        <div id="chained2"></div>
    </div>

    <script type="module">
        import { ChainedInput } from './ChainedInput.js';

        // Demo 1：基本水平連鎖
        const ci1 = new ChainedInput({
            fields: [
                { name: 'country', label: '國家', type: 'select', options: ['台灣', '日本', '美國'] },
                { name: 'city', label: '城市', type: 'text', placeholder: '輸入城市' },
                { name: 'zip', label: '郵遞區號', type: 'text', placeholder: '000' }
            ],
            gap: '12px',
            onChange: (val) => {
                document.getElementById('output').textContent = 'onChange: ' + JSON.stringify(val, null, 2);
            }
        });
        ci1.mount('#chained1');

        document.getElementById('btnGet').addEventListener('click', () => {
            document.getElementById('output').textContent = 'getValues: ' + JSON.stringify(ci1.getValues(), null, 2);
        });

        // Demo 2：垂直排列
        const ci2 = new ChainedInput({
            layout: 'vertical',
            fields: [
                { name: 'hasJob', label: '目前有工作', type: 'checkbox', checkboxLabel: '是' },
                { name: 'company', label: '公司名稱', type: 'text', placeholder: '輸入公司名稱', hideWhenDisabled: true }
            ],
            gap: '8px'
        });
        ci2.mount('#chained2');
    </script>
    <script type="module">
        import { createThemeToggle } from '../../demo-utils.js';
        createThemeToggle();
    </script>
</body>
</html>
