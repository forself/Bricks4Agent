<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DateTimeInput Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 24px; background: var(--cl-bg-secondary); }
        h1 { color: var(--cl-text); }
        .demo-section { background: var(--cl-bg); padding: 24px; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .demo-section h2 { margin-top: 0; color: #555; font-size: 16px; }
        #output { font-family: monospace; font-size: 13px; color: var(--cl-text-secondary); margin-top: 12px; white-space: pre-wrap; }
    </style>
    <link rel="stylesheet" href="../../theme.css">
</head>
<body>
    <h1>DateTimeInput Demo</h1>

    <div class="demo-section">
        <h2>民國年 + 時間選擇</h2>
        <div id="dt1"></div>
        <div id="output1" class="output"></div>
    </div>

    <div class="demo-section">
        <h2>西元年、不含時間</h2>
        <div id="dt2"></div>
        <div id="output2" class="output"></div>
    </div>

    <div class="demo-section">
        <h2>自訂分鐘間距（5 分鐘）</h2>
        <div id="dt3"></div>
    </div>

    <script type="module">
        import { DateTimeInput } from './DateTimeInput.js';

        new DateTimeInput({
            label: '事件時間',
            useROC: true,
            showTime: true,
            minuteStep: 15,
            onChange: (val) => {
                document.getElementById('output1').textContent = JSON.stringify(val, null, 2);
            }
        }).mount('#dt1');

        new DateTimeInput({
            label: '出生日期',
            useROC: false,
            showTime: false,
            dateValue: '1990-01-15',
            onChange: (val) => {
                document.getElementById('output2').textContent = JSON.stringify(val, null, 2);
            }
        }).mount('#dt2');

        new DateTimeInput({
            label: '會議時間',
            useROC: false,
            showTime: true,
            minuteStep: 5
        }).mount('#dt3');
    </script>
    <script type="module">
        import { createThemeToggle } from '../../demo-utils.js';
        createThemeToggle();
    </script>
</body>
</html>
