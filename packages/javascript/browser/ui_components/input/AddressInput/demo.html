<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AddressInput Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 24px; background: var(--cl-bg-secondary); }
        h1 { color: var(--cl-text); }
        .demo-section { background: var(--cl-bg); padding: 24px; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .demo-section h2 { margin-top: 0; color: #555; font-size: 16px; }
        .toolbar { margin-top: 12px; display: flex; gap: 8px; }
        .toolbar button { padding: 6px 16px; cursor: pointer; border: 1px solid var(--cl-border); border-radius: 4px; background: var(--cl-bg); }
        .toolbar button:hover { border-color: #2196F3; color: #2196F3; }
        #output { font-family: monospace; font-size: 13px; color: var(--cl-text-secondary); margin-top: 12px; white-space: pre-wrap; }
    </style>
    <link rel="stylesheet" href="../../theme.css">
</head>
<body>
    <h1>AddressInput Demo</h1>

    <div class="demo-section">
        <h2>基本用法 — 地址輸入（縣市 / 區域 / 地址）</h2>
        <div id="addr1"></div>
        <div class="toolbar">
            <button id="btnGet">取得值</button>
            <button id="btnFull">取得完整地址</button>
        </div>
        <div id="output"></div>
    </div>

    <div class="demo-section">
        <h2>預設值</h2>
        <div id="addr2"></div>
    </div>

    <script type="module">
        import { AddressInput } from './AddressInput.js';

        const addr1 = new AddressInput({
            onChange: (val) => {
                document.getElementById('output').textContent = 'onChange: ' + JSON.stringify(val, null, 2);
            }
        });
        addr1.mount('#addr1');

        document.getElementById('btnGet').addEventListener('click', () => {
            document.getElementById('output').textContent = 'getValues: ' + JSON.stringify(addr1.getValues(), null, 2);
        });
        document.getElementById('btnFull').addEventListener('click', () => {
            document.getElementById('output').textContent = 'getFullAddress: ' + addr1.getFullAddress();
        });

        const addr2 = new AddressInput();
        addr2.mount('#addr2');
        addr2.setValues({ city: '台北市', district: '中正區', address: '重慶南路一段122號' });
    </script>
    <script type="module">
        import { createThemeToggle } from '../../demo-utils.js';
        createThemeToggle();
    </script>
</body>
</html>
