<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ListInput Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 24px; background: var(--cl-bg-secondary); }
        h1 { color: var(--cl-text); }
        .demo-section { background: var(--cl-bg); padding: 24px; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .demo-section h2 { margin-top: 0; color: #555; font-size: 16px; }
        .toolbar { margin-top: 12px; display: flex; gap: 8px; }
        .toolbar button { padding: 6px 16px; cursor: pointer; border: 1px solid var(--cl-border); border-radius: 4px; background: var(--cl-bg); }
        .toolbar button:hover { border-color: #2196F3; color: #2196F3; }
        #output { font-family: monospace; font-size: 13px; color: var(--cl-text-secondary); margin-top: 12px; white-space: pre-wrap; }
    </style>
    <link rel="stylesheet" href="../../theme.css">
</head>
<body>
    <h1>ListInput Demo</h1>

    <div class="demo-section">
        <h2>基本用法 — 動態項目清單（最多 5 筆）</h2>
        <div id="list1"></div>
        <div class="toolbar">
            <button id="btnGet">取得值</button>
        </div>
        <div id="output"></div>
    </div>

    <div class="demo-section">
        <h2>自訂 renderItem</h2>
        <div id="list2"></div>
    </div>

    <script type="module">
        import { ListInput } from './ListInput.js';

        // Demo 1：使用 fields 定義
        const list1 = new ListInput({
            title: '聯絡人清單',
            minItems: 1,
            maxItems: 5,
            addButtonText: '新增聯絡人',
            fields: [
                { name: 'name', label: '姓名', type: 'text' },
                { name: 'email', label: 'Email', type: 'text' }
            ],
            onChange: (val) => {
                document.getElementById('output').textContent = 'onChange: ' + JSON.stringify(val, null, 2);
            }
        });
        list1.mount('#list1');

        document.getElementById('btnGet').addEventListener('click', () => {
            document.getElementById('output').textContent = 'getValues: ' + JSON.stringify(list1.getValues(), null, 2);
        });

        // Demo 2：自訂 renderItem
        new ListInput({
            title: '備註清單',
            maxItems: 3,
            renderItem: (container, index, value, onChange) => {
                const textarea = document.createElement('textarea');
                textarea.rows = 2;
                textarea.style.cssText = 'width:100%;border:1px solid var(--cl-border);border-radius:4px;padding:8px;resize:vertical;';
                textarea.placeholder = `備註 ${index + 1}`;
                textarea.value = value || '';
                textarea.addEventListener('input', () => onChange(textarea.value));
                container.appendChild(textarea);
            }
        }).mount('#list2');
    </script>
    <script type="module">
        import { createThemeToggle } from '../../demo-utils.js';
        createThemeToggle();
    </script>
</body>
</html>
