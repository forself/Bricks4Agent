<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToggleSwitch Demo</title>
    <link rel="stylesheet" href="../../theme.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 24px;
        }

        .panel {
            max-width: 720px;
            margin: 0 auto;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 24px;
        }

        .row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 16px;
        }

        #status {
            color: #475569;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="panel">
        <h1>ToggleSwitch Demo</h1>
        <div id="demo" class="row"></div>
        <div id="status">No change yet.</div>
    </div>

    <script type="module">
        import { ToggleSwitch } from './ToggleSwitch.js';

        const host = document.getElementById('demo');
        const status = document.getElementById('status');

        [
            new ToggleSwitch({
                label: 'Notifications',
                checked: true,
                onChange: checked => { status.textContent = `Notifications: ${checked}`; }
            }),
            new ToggleSwitch({
                label: 'Auto Save',
                size: 'large',
                onChange: checked => { status.textContent = `Auto Save: ${checked}`; }
            }),
            new ToggleSwitch({
                label: 'Disabled',
                checked: true,
                disabled: true
            })
        ].forEach(toggle => toggle.mount(host));
    </script>
</body>

</html>
