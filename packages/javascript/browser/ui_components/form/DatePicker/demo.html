<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DatePicker & TimePicker 展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #fff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            background: linear-gradient(90deg, #FF9800, #E91E63);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #8892b0;
            margin-bottom: 40px;
        }

        .demo-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .demo-section h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #ccd6f6;
        }

        .demo-row {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .demo-item {
            min-width: 200px;
        }

        .demo-label {
            font-size: 12px;
            color: #8892b0;
            margin-bottom: 8px;
            display: block;
        }

        .output {
            margin-top: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            font-size: 13px;
            color: #64ffda;
        }

        /* 表單範例 */
        .form-demo {
            background: var(--cl-bg);
            border-radius: 12px;
            padding: 24px;
            color: var(--cl-text);
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: flex-start;
        }

        .compare-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .compare-item h3 {
            font-size: 14px;
            color: #8892b0;
            margin-bottom: 12px;
        }

        .compare-item p {
            font-size: 12px;
            color: var(--cl-text-secondary);
            margin-bottom: 12px;
        }
    </style>
    <link rel="stylesheet" href="../../theme.css">
</head>

<body>
    <div class="container">
        <h1>📅 Date & Time Picker</h1>
        <p class="subtitle">日期與時間選擇器</p>

        <!-- 日期選擇器對比 -->
        <div class="demo-section">
            <h2>日期選擇器 (DatePicker)</h2>
            <div class="compare-box">
                <div class="compare-item">
                    <h3>西元年 (Western)</h3>
                    <p>格式: YYYY/MM/DD</p>
                    <div id="date-western"></div>
                </div>
                <div class="compare-item">
                    <h3>民國年 (Taiwan)</h3>
                    <p>格式: YYY/MM/DD (民國)</p>
                    <div id="date-taiwan"></div>
                </div>
            </div>
            <div class="output" id="date-output">選擇的日期將顯示在這裡</div>
        </div>

        <!-- 帶範圍限制 -->
        <div class="demo-section">
            <h2>日期範圍限制</h2>
            <div class="demo-row">
                <div class="demo-item">
                    <span class="demo-label">只能選未來日期</span>
                    <div id="date-future"></div>
                </div>
                <div class="demo-item">
                    <span class="demo-label">只能選過去 30 天</span>
                    <div id="date-past"></div>
                </div>
            </div>
        </div>

        <!-- 時間選擇器 -->
        <div class="demo-section">
            <h2>時間選擇器 (TimePicker)</h2>
            <div class="demo-row">
                <div class="demo-item">
                    <span class="demo-label">基本 (1 分鐘間隔)</span>
                    <div id="time-basic"></div>
                </div>
                <div class="demo-item">
                    <span class="demo-label">15 分鐘間隔</span>
                    <div id="time-15min"></div>
                </div>
                <div class="demo-item">
                    <span class="demo-label">30 分鐘間隔</span>
                    <div id="time-30min"></div>
                </div>
            </div>
            <div class="output" id="time-output">選擇的時間將顯示在這裡</div>
        </div>

        <!-- 實際應用 -->
        <div class="demo-section">
            <h2>實際應用：會議預約</h2>
            <div class="form-demo">
                <div class="form-row">
                    <div id="meeting-date"></div>
                    <div id="meeting-start"></div>
                    <div id="meeting-end"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { DatePicker } from './DatePicker.js';
        import { TimePicker } from '../TimePicker/TimePicker.js';

        const dateOutput = document.getElementById('date-output');
        const timeOutput = document.getElementById('time-output');

        // 西元年
        new DatePicker({
            format: 'western',
            placeholder: '選擇日期',
            width: '180px',
            onChange: (date, formatted) => {
                dateOutput.textContent = `西元年: ${formatted} (${date.toLocaleDateString('zh-TW', { weekday: 'long' })})`;
            }
        }).mount('#date-western');

        // 民國年
        new DatePicker({
            format: 'taiwan',
            placeholder: '選擇日期',
            width: '180px',
            onChange: (date, formatted) => {
                dateOutput.textContent = `民國年: ${formatted} (${date.toLocaleDateString('zh-TW', { weekday: 'long' })})`;
            }
        }).mount('#date-taiwan');

        // 未來日期
        new DatePicker({
            format: 'western',
            min: new Date(),
            placeholder: '選擇日期',
            width: '180px'
        }).mount('#date-future');

        // 過去 30 天
        const past30 = new Date();
        past30.setDate(past30.getDate() - 30);
        new DatePicker({
            format: 'taiwan',
            min: past30,
            max: new Date(),
            placeholder: '選擇日期',
            width: '180px'
        }).mount('#date-past');

        // 時間選擇器
        new TimePicker({
            placeholder: '選擇時間',
            minuteStep: 1,
            width: '140px',
            onChange: (time) => timeOutput.textContent = `選擇時間: ${time}`
        }).mount('#time-basic');

        new TimePicker({
            placeholder: '選擇時間',
            minuteStep: 15,
            width: '140px',
            onChange: (time) => timeOutput.textContent = `選擇時間: ${time}`
        }).mount('#time-15min');

        new TimePicker({
            placeholder: '選擇時間',
            minuteStep: 30,
            width: '140px',
            onChange: (time) => timeOutput.textContent = `選擇時間: ${time}`
        }).mount('#time-30min');

        // 會議預約
        new DatePicker({
            format: 'western',
            label: '會議日期',
            placeholder: '選擇日期',
            min: new Date(),
            required: true,
            width: '180px'
        }).mount('#meeting-date');

        new TimePicker({
            label: '開始時間',
            placeholder: '開始',
            minuteStep: 15,
            value: '09:00',
            required: true,
            width: '130px'
        }).mount('#meeting-start');

        new TimePicker({
            label: '結束時間',
            placeholder: '結束',
            minuteStep: 15,
            value: '10:00',
            required: true,
            width: '130px'
        }).mount('#meeting-end');
    </script>
    <script type="module">
        import { createThemeToggle } from '../../demo-utils.js';
        createThemeToggle();
    </script>
</body>

</html>
