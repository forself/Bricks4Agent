<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Inputs 元件展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #fff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            background: linear-gradient(90deg, #4CAF50, #2196F3, #9C27B0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #8892b0;
            margin-bottom: 40px;
        }

        .demo-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .demo-section h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #ccd6f6;
        }

        .demo-row {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .demo-item {
            flex: 1;
            min-width: 200px;
        }

        .output {
            margin-top: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            font-size: 13px;
            color: #64ffda;
        }

        /* 表單範例 */
        .form-demo {
            background: var(--cl-bg);
            border-radius: 12px;
            padding: 24px;
            color: var(--cl-text);
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row>div {
            flex: 1;
        }

        .section-title {
            font-size: 13px;
            color: var(--cl-text-secondary);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--cl-border-light);
        }
    </style>
    <link rel="stylesheet" href="../../theme.css">
</head>

<body>
    <div class="container">
        <h1>📝 Form Inputs</h1>
        <p class="subtitle">表單輸入元件 - 文字、數字、複選、單選</p>

        <!-- 文字輸入 -->
        <div class="demo-section">
            <h2>文字輸入欄 (TextInput)</h2>
            <div class="demo-row">
                <div class="demo-item" id="text-basic"></div>
                <div class="demo-item" id="text-password"></div>
            </div>
            <div class="demo-row">
                <div class="demo-item" id="text-with-label"></div>
                <div class="demo-item" id="text-error"></div>
            </div>
        </div>

        <!-- 數字輸入 -->
        <div class="demo-section">
            <h2>數字輸入欄 (NumberInput)</h2>
            <div class="demo-row">
                <div class="demo-item" id="number-basic"></div>
                <div class="demo-item" id="number-range"></div>
                <div class="demo-item" id="number-decimal"></div>
            </div>
            <div class="output" id="number-output">選擇的數值將顯示在這裡</div>
        </div>

        <!-- 複選框 -->
        <div class="demo-section">
            <h2>複選框 (Checkbox)</h2>
            <div class="demo-row">
                <div class="demo-item">
                    <div class="section-title">單個複選框</div>
                    <div id="checkbox-single"></div>
                </div>
                <div class="demo-item">
                    <div class="section-title">複選群組 (垂直)</div>
                    <div id="checkbox-group-v"></div>
                </div>
                <div class="demo-item">
                    <div class="section-title">複選群組 (水平)</div>
                    <div id="checkbox-group-h"></div>
                </div>
            </div>
            <div class="output" id="checkbox-output">選擇的項目將顯示在這裡</div>
        </div>

        <!-- 單選按鈕 -->
        <div class="demo-section">
            <h2>單選按鈕 (Radio)</h2>
            <div class="demo-row">
                <div class="demo-item">
                    <div class="section-title">單選群組 (垂直)</div>
                    <div id="radio-group-v"></div>
                </div>
                <div class="demo-item">
                    <div class="section-title">單選群組 (水平)</div>
                    <div id="radio-group-h"></div>
                </div>
            </div>
            <div class="output" id="radio-output">選擇的項目將顯示在這裡</div>
        </div>

        <!-- 綜合表單 -->
        <div class="demo-section">
            <h2>實際應用：註冊表單</h2>
            <div class="form-demo">
                <div class="form-row">
                    <div id="form-name"></div>
                    <div id="form-email"></div>
                </div>
                <div class="form-row">
                    <div id="form-age"></div>
                    <div id="form-gender"></div>
                </div>
                <div class="form-row">
                    <div>
                        <div class="section-title">興趣 (可多選)</div>
                        <div id="form-interests"></div>
                    </div>
                </div>
                <div class="form-row">
                    <div id="form-agree"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { TextInput } from '../TextInput/TextInput.js';
        import { NumberInput } from '../NumberInput/NumberInput.js';
        import { Checkbox } from '../Checkbox/Checkbox.js';
        import { Radio } from '../Radio/Radio.js';

        // 文字輸入
        new TextInput({
            placeholder: '請輸入文字...',
            width: '100%'
        }).mount('#text-basic');

        new TextInput({
            type: 'password',
            placeholder: '請輸入密碼...'
        }).mount('#text-password');

        new TextInput({
            label: '姓名',
            placeholder: '請輸入姓名',
            required: true
        }).mount('#text-with-label');

        new TextInput({
            label: 'Email',
            placeholder: 'example@mail.com',
            error: '請輸入有效的 Email'
        }).mount('#text-error');

        // 數字輸入
        const numberOutput = document.getElementById('number-output');

        new NumberInput({
            label: '數量',
            value: 10,
            min: 0,
            max: 100,
            onChange: v => numberOutput.textContent = `基本: ${v}`
        }).mount('#number-basic');

        new NumberInput({
            label: '年齡 (18-65)',
            value: 25,
            min: 18,
            max: 65,
            onChange: v => numberOutput.textContent = `年齡: ${v}`
        }).mount('#number-range');

        new NumberInput({
            label: '價格',
            value: 99.99,
            step: 0.5,
            precision: 2,
            min: 0,
            onChange: v => numberOutput.textContent = `價格: $${v}`
        }).mount('#number-decimal');

        // 複選框
        const checkboxOutput = document.getElementById('checkbox-output');

        new Checkbox({
            label: '我同意服務條款',
            onChange: (checked) => checkboxOutput.textContent = `同意條款: ${checked}`
        }).mount('#checkbox-single');

        document.getElementById('checkbox-group-v').appendChild(
            Checkbox.createGroup({
                items: [
                    { label: '選項 A', value: 'a' },
                    { label: '選項 B', value: 'b' },
                    { label: '選項 C', value: 'c', disabled: true },
                ],
                direction: 'vertical',
                onChange: (values) => checkboxOutput.textContent = `垂直群組: ${values.join(', ') || '無'}`
            })
        );

        document.getElementById('checkbox-group-h').appendChild(
            Checkbox.createGroup({
                items: [
                    { label: '紅色', value: 'red' },
                    { label: '綠色', value: 'green' },
                    { label: '藍色', value: 'blue' },
                ],
                direction: 'horizontal',
                onChange: (values) => checkboxOutput.textContent = `水平群組: ${values.join(', ') || '無'}`
            })
        );

        // 單選按鈕
        const radioOutput = document.getElementById('radio-output');

        document.getElementById('radio-group-v').appendChild(
            Radio.createGroup({
                name: 'option-v',
                items: [
                    { label: '選項一', value: '1' },
                    { label: '選項二', value: '2' },
                    { label: '選項三', value: '3' },
                ],
                value: '1',
                direction: 'vertical',
                onChange: (value) => radioOutput.textContent = `垂直群組: 選項 ${value}`
            })
        );

        document.getElementById('radio-group-h').appendChild(
            Radio.createGroup({
                name: 'size',
                items: [
                    { label: 'S', value: 's' },
                    { label: 'M', value: 'm' },
                    { label: 'L', value: 'l' },
                    { label: 'XL', value: 'xl' },
                ],
                value: 'm',
                direction: 'horizontal',
                onChange: (value) => radioOutput.textContent = `尺寸: ${value.toUpperCase()}`
            })
        );

        // 表單應用
        new TextInput({ label: '姓名', placeholder: '請輸入姓名', required: true }).mount('#form-name');
        new TextInput({ label: 'Email', type: 'email', placeholder: 'example@mail.com', required: true }).mount('#form-email');
        new NumberInput({ label: '年齡', min: 1, max: 120, value: 25, width: '100%' }).mount('#form-age');

        const genderContainer = document.getElementById('form-gender');
        const genderLabel = document.createElement('div');
        genderLabel.innerHTML = '<label style="font-size:13px;font-weight:500;color:#333;display:block;margin-bottom:8px;">性別</label>';
        genderContainer.appendChild(genderLabel);
        genderContainer.appendChild(
            Radio.createGroup({
                name: 'gender',
                items: [
                    { label: '男', value: 'male' },
                    { label: '女', value: 'female' },
                    { label: '其他', value: 'other' },
                ],
                direction: 'horizontal'
            })
        );

        document.getElementById('form-interests').appendChild(
            Checkbox.createGroup({
                items: [
                    { label: '運動', value: 'sports' },
                    { label: '閱讀', value: 'reading' },
                    { label: '音樂', value: 'music' },
                    { label: '旅行', value: 'travel' },
                    { label: '美食', value: 'food' },
                ],
                direction: 'horizontal'
            })
        );

        new Checkbox({ label: '我同意服務條款與隱私政策', required: true }).mount('#form-agree');
    </script>
    <script type="module">
        import { createThemeToggle } from '../../demo-utils.js';
        createThemeToggle();
    </script>
</body>

</html>
