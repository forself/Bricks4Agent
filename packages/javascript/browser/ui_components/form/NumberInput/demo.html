<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>NumberInput Demo</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { font-size: 22px; }
        h2 { font-size: 16px; margin-top: 32px; color: #555; }
        .row { margin-bottom: 20px; }
        #log { margin-top: 16px; padding: 12px; background: var(--cl-bg-secondary); border-radius: 6px; font-size: 13px; white-space: pre-wrap; min-height: 40px; }
    </style>
    <link rel="stylesheet" href="../../theme.css">
</head>
<body>
    <h1>NumberInput Demo</h1>
    <p>數字輸入框 — 加減按鈕、範圍限制、精度控制</p>

    <h2>1. 基本整數（0-100）</h2>
    <div id="demo1" class="row"></div>

    <h2>2. 小數精度（step=0.1, precision=2）</h2>
    <div id="demo2" class="row"></div>

    <h2>3. 無按鈕模式</h2>
    <div id="demo3" class="row"></div>

    <h2>4. 三種尺寸</h2>
    <div id="demo4" style="display:flex; gap:16px;"></div>

    <div id="log"></div>

    <script type="module">
        import { NumberInput } from './NumberInput.js';

        const log = (msg) => { document.getElementById('log').textContent += msg + '\n'; };

        // Demo 1: 基本
        new NumberInput({
            label: '數量',
            value: 10,
            min: 0,
            max: 100,
            step: 1,
            width: '200px',
            onChange: v => log(`基本: ${v}`)
        }).mount('#demo1');

        // Demo 2: 小數
        new NumberInput({
            label: '價格',
            value: 9.99,
            min: 0,
            max: 9999,
            step: 0.1,
            precision: 2,
            width: '200px',
            onChange: v => log(`價格: ${v}`)
        }).mount('#demo2');

        // Demo 3: 無按鈕
        new NumberInput({
            label: '金額',
            value: 500,
            min: 0,
            max: 100000,
            showButtons: false,
            width: '200px',
            onChange: v => log(`金額: ${v}`)
        }).mount('#demo3');

        // Demo 4: 尺寸
        ['small', 'medium', 'large'].forEach(size => {
            new NumberInput({
                label: size,
                value: 5,
                min: 0,
                max: 99,
                size,
                width: '150px'
            }).mount('#demo4');
        });
    </script>
    <script type="module">
        import { createThemeToggle } from '../../demo-utils.js';
        createThemeToggle();
    </script>
</body>
</html>
