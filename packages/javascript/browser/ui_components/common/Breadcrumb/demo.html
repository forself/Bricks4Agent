<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breadcrumb Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 24px; background: var(--cl-bg-secondary); }
        h1 { color: var(--cl-text); }
        .demo-section { background: var(--cl-bg); padding: 24px; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .demo-section h2 { margin-top: 0; color: #555; font-size: 16px; }
        .toolbar { margin-top: 12px; display: flex; gap: 8px; }
        .toolbar button { padding: 6px 16px; cursor: pointer; border: 1px solid var(--cl-border); border-radius: 4px; background: var(--cl-bg); }
        .toolbar button:hover { border-color: #2196F3; color: #2196F3; }
        #log { font-family: monospace; font-size: 13px; color: var(--cl-text-secondary); margin-top: 12px; }
    </style>
    <link rel="stylesheet" href="../../theme.css">
</head>
<body>
    <h1>Breadcrumb Demo</h1>

    <div class="demo-section">
        <h2>基本用法</h2>
        <div id="bc1"></div>
    </div>

    <div class="demo-section">
        <h2>自訂分隔符號 + 無首頁</h2>
        <div id="bc2"></div>
    </div>

    <div class="demo-section">
        <h2>動態操作：push / pop</h2>
        <div id="bc3"></div>
        <div class="toolbar">
            <button id="btnPush">Push 一層</button>
            <button id="btnPop">Pop 一層</button>
        </div>
        <div id="log"></div>
    </div>

    <script type="module">
        import { Breadcrumb } from './Breadcrumb.js';

        // Demo 1：基本用法
        new Breadcrumb({
            items: [
                { text: '使用者管理', href: '#/users' },
                { text: '編輯使用者' }
            ],
            onNavigate: (item) => console.log('導航:', item)
        }).mount('#bc1');

        // Demo 2：自訂分隔符號
        new Breadcrumb({
            items: [
                { text: '系統', href: '#' },
                { text: '設定', href: '#' },
                { text: '安全性' }
            ],
            separator: '>',
            showHome: false
        }).mount('#bc2');

        // Demo 3：動態操作
        const logEl = document.getElementById('log');
        const bc3 = new Breadcrumb({
            items: [
                { text: '文件庫', href: '#' }
            ],
            onNavigate: (item, index) => {
                logEl.textContent = `導航至: ${item.text} (index: ${index})`;
            }
        });
        bc3.mount('#bc3');

        let depth = 1;
        document.getElementById('btnPush').addEventListener('click', () => {
            depth++;
            bc3.push({ text: `子目錄 ${depth}`, href: '#' });
        });
        document.getElementById('btnPop').addEventListener('click', () => {
            if (depth > 1) { depth--; bc3.pop(); }
        });
    </script>
    <script type="module">
        import { createThemeToggle } from '../../demo-utils.js';
        createThemeToggle();
    </script>
</body>
</html>
