<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SortButton Demo</title>
    <link rel="stylesheet" href="../../theme.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 24px;
        }

        .table {
            max-width: 720px;
            margin: 0 auto;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
        }

        .header,
        .row {
            display: grid;
            grid-template-columns: 1fr 120px 120px;
            gap: 12px;
            padding: 14px 18px;
            align-items: center;
        }

        .header {
            background: #111827;
            color: white;
            font-weight: 600;
        }

        .row:nth-child(even) {
            background: #f8fafc;
        }

        #status {
            max-width: 720px;
            margin: 16px auto 0;
            color: #475569;
        }
    </style>
</head>

<body>
    <div class="table">
        <div class="header">
            <div>Name</div>
            <div id="age-header">Age</div>
            <div id="score-header">Score</div>
        </div>
        <div class="row"><div>Jordan</div><div>33</div><div>92</div></div>
        <div class="row"><div>Alex</div><div>28</div><div>88</div></div>
        <div class="row"><div>Casey</div><div>41</div><div>95</div></div>
    </div>
    <div id="status">No sort selected.</div>

    <script type="module">
        import { SortButton } from './SortButton.js';

        const status = document.getElementById('status');

        new SortButton({
            field: 'age',
            onSort: (field, state) => {
                status.textContent = `Sort ${field}: ${state}`;
            }
        }).mount(document.getElementById('age-header'));

        new SortButton({
            field: 'score',
            onSort: (field, state) => {
                status.textContent = `Sort ${field}: ${state}`;
            }
        }).mount(document.getElementById('score-header'));
    </script>
</body>

</html>
