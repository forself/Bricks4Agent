<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagination Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 24px; background: var(--cl-bg-secondary); }
        h1 { color: var(--cl-text); }
        .demo-section { background: var(--cl-bg); padding: 24px; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .demo-section h2 { margin-top: 0; color: #555; font-size: 16px; }
        .toolbar { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
        button { padding: 6px 16px; cursor: pointer; border: 1px solid var(--cl-border); border-radius: 4px; background: var(--cl-bg); }
        button:hover { border-color: #2196F3; color: #2196F3; }
        #state { font-family: monospace; font-size: 13px; color: var(--cl-text-secondary); margin-top: 12px; padding: 8px; background: #f9f9f9; border-radius: 4px; }
    </style>
    <link rel="stylesheet" href="../../theme.css">
</head>
<body>
    <h1>Pagination Demo</h1>

    <div class="demo-section">
        <h2>完整功能（總筆數 + 每頁選擇 + 跳頁）</h2>
        <div id="pager1"></div>
        <div id="state"></div>
    </div>

    <div class="demo-section">
        <h2>精簡模式（僅頁碼）</h2>
        <div id="pager2"></div>
    </div>

    <div class="demo-section">
        <h2>動態操作</h2>
        <div id="pager3"></div>
        <div class="toolbar">
            <button id="btnGoTo5">goTo(5)</button>
            <button id="btnSetTotal">setTotal(500)</button>
            <button id="btnSetSize">setPageSize(50)</button>
            <button id="btnGetState">getState()</button>
        </div>
    </div>

    <script type="module">
        import { Pagination } from './Pagination.js';

        const stateEl = document.getElementById('state');

        // Demo 1：完整功能
        const pager1 = new Pagination({
            total: 256,
            pageSize: 20,
            onChange: (page, pageSize) => {
                stateEl.textContent = `onChange => page: ${page}, pageSize: ${pageSize}`;
            }
        });
        pager1.mount('#pager1');

        // Demo 2：精簡模式
        new Pagination({
            total: 100,
            pageSize: 10,
            showTotal: false,
            showPageSize: false,
            showJumper: false
        }).mount('#pager2');

        // Demo 3：動態操作
        const pager3 = new Pagination({
            total: 200,
            pageSize: 20,
            onChange: (page, pageSize) => {
                console.log('pager3 onChange:', page, pageSize);
            }
        });
        pager3.mount('#pager3');

        document.getElementById('btnGoTo5').addEventListener('click', () => pager3.goTo(5));
        document.getElementById('btnSetTotal').addEventListener('click', () => pager3.setTotal(500));
        document.getElementById('btnSetSize').addEventListener('click', () => pager3.setPageSize(50));
        document.getElementById('btnGetState').addEventListener('click', () => {
            alert(JSON.stringify(pager3.getState(), null, 2));
        });
    </script>
    <script type="module">
        import { createThemeToggle } from '../../demo-utils.js';
        createThemeToggle();
    </script>
</body>
</html>
