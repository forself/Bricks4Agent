<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120">
  <defs>
    <!-- 共用下載箭頭符號 -->
    <symbol id="download-arrow" viewBox="0 0 16 16">
      <path fill="white" d="M8 12L3 7h3V2h4v5h3L8 12z"/>
      <rect fill="white" x="2" y="13" width="12" height="2" rx="1"/>
    </symbol>
    
    <!-- 陰影濾鏡 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- XLS Excel 圖示 -->
  <g id="icon-xls" transform="translate(10, 10)">
    <rect width="80" height="100" rx="8" fill="#217346" filter="url(#shadow)"/>
    <!-- 表格格線 -->
    <rect x="12" y="15" width="56" height="45" rx="2" fill="white" opacity="0.9"/>
    <line x1="12" y1="30" x2="68" y2="30" stroke="#217346" stroke-width="1.5"/>
    <line x1="12" y1="45" x2="68" y2="45" stroke="#217346" stroke-width="1.5"/>
    <line x1="32" y1="15" x2="32" y2="60" stroke="#217346" stroke-width="1.5"/>
    <line x1="52" y1="15" x2="52" y2="60" stroke="#217346" stroke-width="1.5"/>
    <!-- XLS 文字 -->
    <text x="40" y="80" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">XLS</text>
    <!-- 下載箭頭 -->
    <use href="#download-arrow" x="54" y="74" width="20" height="20"/>
  </g>

  <!-- Word 文件圖示 -->
  <g id="icon-word" transform="translate(120, 10)">
    <rect width="80" height="100" rx="8" fill="#2B579A" filter="url(#shadow)"/>
    <!-- 文件線條 -->
    <rect x="14" y="15" width="52" height="45" rx="2" fill="white" opacity="0.9"/>
    <line x1="20" y1="25" x2="60" y2="25" stroke="#2B579A" stroke-width="2"/>
    <line x1="20" y1="35" x2="55" y2="35" stroke="#2B579A" stroke-width="2"/>
    <line x1="20" y1="45" x2="50" y2="45" stroke="#2B579A" stroke-width="2"/>
    <!-- W 標誌 -->
    <text x="40" y="80" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">DOC</text>
    <!-- 下載箭頭 -->
    <use href="#download-arrow" x="54" y="74" width="20" height="20"/>
  </g>

  <!-- PDF 圖示 -->
  <g id="icon-pdf" transform="translate(230, 10)">
    <rect width="80" height="100" rx="8" fill="#E53935" filter="url(#shadow)"/>
    <!-- PDF 文件摺角 -->
    <path d="M14 15 L54 15 L66 27 L66 60 L14 60 Z" fill="white" opacity="0.9"/>
    <path d="M54 15 L54 27 L66 27 Z" fill="#FFCDD2"/>
    <!-- PDF 文字標誌 -->
    <text x="40" y="80" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">PDF</text>
    <!-- 下載箭頭 -->
    <use href="#download-arrow" x="54" y="74" width="20" height="20"/>
  </g>

  <!-- 圖片圖示 -->
  <g id="icon-image" transform="translate(340, 10)">
    <rect width="80" height="100" rx="8" fill="#7B1FA2" filter="url(#shadow)"/>
    <!-- 風景圖示 -->
    <rect x="12" y="15" width="56" height="45" rx="4" fill="white" opacity="0.9"/>
    <!-- 太陽 -->
    <circle cx="28" cy="30" r="8" fill="#FFC107"/>
    <!-- 山脈 -->
    <path d="M12 60 L30 35 L45 50 L55 38 L68 60 Z" fill="#7B1FA2"/>
    <!-- IMG 文字 -->
    <text x="40" y="80" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">IMG</text>
    <!-- 下載箭頭 -->
    <use href="#download-arrow" x="54" y="74" width="20" height="20"/>
  </g>

  <!-- 人像圖示 -->
  <g id="icon-portrait" transform="translate(450, 10)">
    <rect width="80" height="100" rx="8" fill="#00838F" filter="url(#shadow)"/>
    <!-- 人像框 -->
    <rect x="15" y="12" width="50" height="55" rx="4" fill="white" opacity="0.9"/>
    <!-- 人像頭部 -->
    <circle cx="40" cy="30" r="12" fill="#00838F"/>
    <!-- 人像身體 -->
    <ellipse cx="40" cy="58" rx="18" ry="12" fill="#00838F"/>
    <!-- 裁切遮罩效果 (只顯示上半身) -->
    <rect x="15" y="50" width="50" height="17" fill="white" opacity="0.9"/>
    <path d="M22 67 Q40 45 58 67 Z" fill="#00838F"/>
    <!-- 文字 -->
    <text x="40" y="83" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">PHOTO</text>
    <!-- 下載箭頭 -->
    <use href="#download-arrow" x="54" y="74" width="20" height="20"/>
  </g>
</svg>
