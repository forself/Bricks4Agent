<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPainter Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 24px; background: var(--cl-bg-secondary); }
        h1 { color: var(--cl-text); }
        .demo-section { background: var(--cl-bg); padding: 24px; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .demo-section h2 { margin-top: 0; color: #555; font-size: 16px; }
        .demo-section p { color: #888; font-size: 13px; margin: 4px 0 12px; }
        .toolbar { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
        .toolbar button { padding: 6px 16px; cursor: pointer; border: 1px solid var(--cl-border); border-radius: 4px; background: var(--cl-bg); }
        .toolbar button:hover { border-color: #2196F3; color: #2196F3; }
    </style>
    <link rel="stylesheet" href="../../theme.css">
</head>
<body>
    <h1>WebPainter Demo</h1>

    <div class="demo-section">
        <h2>完整圖片編輯器</h2>
        <p>支援多物件繪製（矩形、圓形、線條、箭頭、文字）、圖層管理、縮放、匯出 PNG/JSON。</p>
        <div id="painter1"></div>
        <div class="toolbar">
            <button id="btnUndo">復原</button>
            <button id="btnRedo">重做</button>
            <button id="btnClear">清除</button>
            <button id="btnPNG">匯出 PNG</button>
            <button id="btnJSON">匯出 JSON</button>
        </div>
    </div>

    <div class="demo-section">
        <h2>精簡版（僅工具列 + 畫布）</h2>
        <div id="painter2"></div>
    </div>

    <script type="module">
        import { WebPainter } from './WebPainter.js';

        const painter1 = new WebPainter({
            container: '#painter1',
            width: 900,
            height: 550,
            features: {
                header: true,
                settings: true,
                upload: true,
                tools: true,
                delete: true,
                clear: true,
                export: true,
                zoom: true,
                layers: true
            }
        });

        document.getElementById('btnUndo').addEventListener('click', () => painter1.undo());
        document.getElementById('btnRedo').addEventListener('click', () => painter1.redo());
        document.getElementById('btnClear').addEventListener('click', () => painter1.clear());
        document.getElementById('btnPNG').addEventListener('click', () => painter1.exportPNG('painting.png'));
        document.getElementById('btnJSON').addEventListener('click', () => {
            const json = painter1.exportJSON();
            console.log('Exported JSON:', json);
            alert('JSON 已輸出至 console（元素數: ' + (json?.elements?.length || 0) + '）');
        });

        // 精簡版
        new WebPainter({
            container: '#painter2',
            width: 600,
            height: 350,
            features: {
                header: true,
                tools: true,
                zoom: true,
                settings: false,
                upload: false,
                layers: false,
                export: false,
                delete: true,
                clear: true
            }
        });
    </script>
    <script type="module">
        import { createThemeToggle } from '../../demo-utils.js';
        createThemeToggle();
    </script>
</body>
</html>
