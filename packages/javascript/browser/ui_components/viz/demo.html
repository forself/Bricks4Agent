<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231f2937'/%3E%3Cpath d='M14 42h8V26h-8zm14 0h8V18h-8zm14 0h8V32h-8z' fill='%23f9fafb'/%3E%3C/svg%3E">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Visualization Demo</title>
    <link rel="stylesheet" href="../theme.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 20px;
            color: #1f2937;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--cl-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 18px;
            color: #4b5563;
        }

        .chart-box {
            width: 100%;
            height: 300px;
        }

        .map-container {
            width: 100%;
            height: 400px;
            background: #e5e7eb;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4b5563;
            text-align: center;
            padding: 20px;
        }

        .map-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .map-actions button {
            border: 0;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            background: #111827;
            color: #f9fafb;
        }

        .map-actions button[disabled] {
            cursor: not-allowed;
            opacity: 0.5;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Dashboard Visualization Kit</h1>

        <div class="grid">
            <div class="card">
                <h2>Bar Chart</h2>
                <div id="chart-bar" class="chart-box"></div>
            </div>
            <div class="card">
                <h2>Stacked Bar</h2>
                <div id="chart-bar-stacked" class="chart-box"></div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>Line Chart</h2>
                <div id="chart-line" class="chart-box"></div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>Pie Chart</h2>
                <div id="chart-pie" class="chart-box"></div>
            </div>
            <div class="card">
                <h2>Rose Chart</h2>
                <div id="chart-rose" class="chart-box"></div>
            </div>
        </div>

        <!-- OSM Map demo available at OSMMapEditor/demo.html -->
    </div>

    <script type="module">
        import { BarChart } from './BarChart.js';
        import { LineChart } from './LineChart.js';
        import { PieChart } from './PieChart.js';
        import { RoseChart } from './RoseChart.js';

        new BarChart({
            container: '#chart-bar',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                series: [
                    { name: 'Revenue', data: [120, 200, 150, 80, 70, 110] },
                    { name: 'Cost', data: [80, 150, 100, 50, 40, 90] }
                ]
            },
            stacked: false
        });

        new BarChart({
            container: '#chart-bar-stacked',
            stacked: true,
            data: {
                labels: ['Q1', 'Q2', 'Q3', 'Q4'],
                series: [
                    { name: 'Online', data: [50, 60, 55, 70] },
                    { name: 'Store', data: [20, 25, 30, 35] },
                    { name: 'Partner', data: [80, 85, 90, 95] }
                ]
            }
        });

        new LineChart({
            container: '#chart-line',
            data: {
                labels: ['Q1', 'Q2', 'Q3', 'Q4', 'Q5', 'Q6'],
                series: [
                    { name: 'Active Users', data: [1000, 1200, 1800, 2400, 2200, 3000] },
                    { name: 'New Users', data: [200, 150, 400, 500, 300, 600] }
                ]
            }
        });

        new PieChart({
            container: '#chart-pie',
            donut: true,
            data: [
                { name: 'Desktop', value: 45 },
                { name: 'Mobile', value: 25 },
                { name: 'Tablet', value: 20 },
                { name: 'Other', value: 10 }
            ]
        });

        new RoseChart({
            container: '#chart-rose',
            data: {
                labels: ['North', 'East', 'South', 'West', 'Central', 'Island'],
                series: [
                    { name: 'Orders', data: [30, 20, 10, 15, 20, 30] },
                    { name: 'Leads', data: [40, 15, 30, 5, 20, 30] },
                    { name: 'Support', data: [10, 5, 20, 10, 10, 10] }
                ]
            }
        });

        // OSM Map demo: see OSMMapEditor/demo.html

        addMarkersButton.addEventListener('click', () => {
            if (!map) return;

            const points = Array.from({ length: 5 }, (_, index) => ({
                lat: 25.03 + (Math.random() - 0.5) * 0.1,
                lng: 121.55 + (Math.random() - 0.5) * 0.1,
                title: `Marker ${index + 1}`
            }));

            map.addMarkers(points);
        });
    </script>
    <script type="module">
        import { createThemeToggle } from '../demo-utils.js';
        createThemeToggle();
    </script>
</body>

</html>
