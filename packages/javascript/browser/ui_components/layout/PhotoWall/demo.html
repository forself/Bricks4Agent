<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoWall Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 24px; background: var(--cl-bg-secondary); }
        h1 { color: var(--cl-text); }
        .demo-section { background: var(--cl-bg); padding: 24px; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .demo-section h2 { margin-top: 0; color: #555; font-size: 16px; }
        .demo-section p { color: #888; font-size: 13px; margin: 4px 0 12px; }
    </style>
    <link rel="stylesheet" href="../../theme.css">
</head>
<body>
    <h1>PhotoWall Demo</h1>

    <div class="demo-section">
        <h2>照片牆 — 可新增、刪除、批次下載</h2>
        <p>點選照片可預覽，支援多選後批次下載為 ZIP。</p>
        <div id="wall1"></div>
    </div>

    <div class="demo-section">
        <h2>唯讀模式</h2>
        <div id="wall2"></div>
    </div>

    <script type="module">
        import { PhotoWall } from './PhotoWall.js';

        // 產生示範用 SVG 圖片
        const colors = ['#4CAF50', '#2196F3', '#FF9800', '#9C27B0', '#F44336', '#00BCD4'];
        const samplePhotos = colors.map((c, i) => ({
            id: String(i + 1),
            src: `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect fill="${encodeURIComponent(c)}" width="200" height="200"/><text x="100" y="110" text-anchor="middle" fill="white" font-size="24">Photo ${i + 1}</text></svg>`,
            alt: `照片 ${i + 1}`
        }));

        const wall1 = new PhotoWall({
            photos: samplePhotos,
            onAdd: () => console.log('新增照片'),
            onDelete: (id) => console.log('刪除:', id),
            onChange: (photos) => console.log('目前照片數:', photos.length)
        });
        wall1.mount('#wall1');

        // 唯讀
        const wall2 = new PhotoWall({
            photos: samplePhotos.slice(0, 3),
            readOnly: true
        });
        wall2.mount('#wall2');
    </script>
    <script type="module">
        import { createThemeToggle } from '../../demo-utils.js';
        createThemeToggle();
    </script>
</body>
</html>
