<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideMenu Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: var(--cl-bg-secondary); }
        .layout { display: flex; height: 100vh; }
        .main { flex: 1; padding: 24px; overflow-y: auto; }
        h1 { color: var(--cl-text); margin-top: 0; }
        .info { background: var(--cl-bg); padding: 16px; border-radius: 8px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .toolbar { margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
        .toolbar button { padding: 6px 16px; cursor: pointer; border: 1px solid var(--cl-border); border-radius: 4px; background: var(--cl-bg); }
        .toolbar button:hover { border-color: #2196F3; color: #2196F3; }
        #event-log { font-family: monospace; font-size: 13px; color: var(--cl-text-secondary); max-height: 200px; overflow-y: auto; }
    </style>
    <link rel="stylesheet" href="../../theme.css">
</head>
<body>
    <div class="layout">
        <div id="sidebar"></div>
        <div class="main">
            <h1>SideMenu Demo</h1>
            <div class="toolbar">
                <button id="btnToggle">切換收合</button>
                <button id="btnBadge">更新 Badge</button>
                <button id="btnActive">設定選中: settings</button>
            </div>
            <div class="info">
                <h3>事件紀錄</h3>
                <div id="event-log"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { SideMenu } from './SideMenu.js';

        const logEl = document.getElementById('event-log');
        function log(msg) {
            const p = document.createElement('div');
            p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.prepend(p);
        }

        const menu = new SideMenu({
            items: [
                { id: 'dashboard', text: '儀表板', icon: '📊' },
                { id: 'users', text: '使用者管理', icon: '👥', badge: 3, children: [
                    { id: 'user-list', text: '使用者列表' },
                    { id: 'user-add', text: '新增使用者' },
                    { id: 'user-roles', text: '角色管理' }
                ]},
                { id: 'content', text: '內容管理', icon: '📝', children: [
                    { id: 'articles', text: '文章列表' },
                    { id: 'categories', text: '分類管理' }
                ]},
                { id: 'analytics', text: '數據分析', icon: '📈' },
                { id: 'settings', text: '系統設定', icon: '⚙️' },
                { id: 'disabled-item', text: '停用項目', icon: '🚫', disabled: true }
            ],
            activeId: 'dashboard',
            onSelect: (item) => log(`選擇: ${item.text} (${item.id})`),
            onToggle: (collapsed) => log(`選單${collapsed ? '收合' : '展開'}`)
        });
        menu.mount('#sidebar');

        document.getElementById('btnToggle').addEventListener('click', () => menu.toggle());
        document.getElementById('btnBadge').addEventListener('click', () => {
            const val = Math.floor(Math.random() * 120);
            menu.updateBadge('users', val);
            log(`Badge 更新為 ${val}`);
        });
        document.getElementById('btnActive').addEventListener('click', () => {
            menu.setActive('settings');
            log('選中項目設為 settings');
        });
    </script>
    <script type="module">
        import { createThemeToggle } from '../../demo-utils.js';
        createThemeToggle();
    </script>
</body>
</html>
