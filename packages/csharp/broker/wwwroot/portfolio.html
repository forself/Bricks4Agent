<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>B4A 投資組合績效 · Portfolio Analytics</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root {
    --bg-0: #0b0e11;
    --bg-1: #181a20;
    --bg-2: #1e2026;
    --border: #2b3139;
    --text: #eaecef;
    --text-dim: #848e9c;
    --green: #0ecb81;
    --red: #f6465d;
    --yellow: #fcd535;
    --blue: #2b6cb0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg-0);
    color: var(--text);
    font-size: 14px;
  }
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .tag { color: var(--text-dim); font-size: 12px; }
  header .spacer { flex: 1; }
  header select, header button {
    background: var(--bg-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  header button:hover { background: var(--border); }
  header .updated { color: var(--text-dim); font-size: 12px; }

  main { padding: 20px 24px; max-width: 1600px; margin: 0 auto; }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .kpi {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .kpi .label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .kpi .value { font-size: 20px; font-weight: 600; margin-top: 6px; font-variant-numeric: tabular-nums; }
  .kpi .sub { color: var(--text-dim); font-size: 11px; margin-top: 4px; }
  .kpi.pos .value { color: var(--green); }
  .kpi.neg .value { color: var(--red); }
  .kpi.warn .value { color: var(--yellow); }

  .section {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 20px;
  }
  .section h2 {
    margin: 0;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section h2 .hint { color: var(--text-dim); font-size: 11px; font-weight: normal; }
  .section-body { padding: 16px; }

  #equityChart { height: 320px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left;
    color: var(--text-dim);
    font-weight: 500;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  thead th.num, tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  tbody tr:hover { background: var(--bg-2); }
  tbody tr:last-child td { border-bottom: none; }

  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .dim { color: var(--text-dim); }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 900px) {
    .two-col { grid-template-columns: 1fr; }
  }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
  }

  .loading { opacity: 0.5; pointer-events: none; }
</style>
</head>
<body>

<header>
  <h1>📊 Portfolio Analytics</h1>
  <span class="tag">B4A Trading</span>
  <div class="spacer"></div>
  <label class="dim" style="font-size:12px;">交易所</label>
  <select id="exchange">
    <option value="alpaca">Alpaca（美股）</option>
    <option value="binance">Binance（加密）</option>
  </select>
  <label class="dim" style="font-size:12px;">成交數上限</label>
  <select id="limit">
    <option value="100">100</option>
    <option value="500" selected>500</option>
    <option value="1000">1000</option>
    <option value="5000">5000</option>
  </select>
  <label class="dim" style="font-size:12px;">基準</label>
  <select id="benchmarkSymbol" title="需在 quote-worker 已抓過資料的 symbol">
    <option value="AAPL" selected>AAPL（預設）</option>
    <option value="MSFT">MSFT</option>
    <option value="TSLA">TSLA</option>
    <option value="NVDA">NVDA</option>
    <option value="BTC">BTC</option>
    <option value="ETH">ETH</option>
    <option value="">（不顯示）</option>
  </select>
  <button id="refresh">🔄 刷新</button>
  <span class="updated" id="updated">—</span>
</header>

<main id="main">
  <div class="kpi-grid" id="kpiGrid"></div>

  <div class="section">
    <h2>權益曲線 vs 基準 <span class="hint">
      <span style="color:#0ecb81;">■</span> 策略 P&L
      &nbsp;&nbsp;<span style="color:#2b6cb0;">■</span> 買入持有基準（$100k）
    </span></h2>
    <div class="section-body">
      <div id="equityChart"></div>
      <div id="equityEmpty" class="empty" style="display:none;">尚無已平倉交易資料</div>
    </div>
  </div>

  <div class="two-col">
    <div class="section">
      <h2>各商品績效 <span class="hint">Per-Symbol P&L</span></h2>
      <div class="section-body">
        <table id="symbolTable">
          <thead>
            <tr>
              <th>Symbol</th>
              <th class="num">交易數</th>
              <th class="num">勝率</th>
              <th class="num">累積 P&L</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div id="symbolEmpty" class="empty" style="display:none;">—</div>
      </div>
    </div>

    <div class="section">
      <h2>近期平倉 <span class="hint">Recent Round-Trips (Top 20)</span></h2>
      <div class="section-body">
        <table id="rtTable">
          <thead>
            <tr>
              <th>Symbol</th>
              <th>出場時間</th>
              <th class="num">進 / 出場價</th>
              <th class="num">P&L</th>
              <th class="num">%</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div id="rtEmpty" class="empty" style="display:none;">—</div>
      </div>
    </div>
  </div>
</main>

<script>
const $ = id => document.getElementById(id);

// 格式化工具
const fmt = {
  num: v => v == null ? '—' : Number(v).toLocaleString('en-US', { maximumFractionDigits: 2 }),
  money: v => v == null ? '—' : Number(v).toLocaleString('en-US', { maximumFractionDigits: 2, signDisplay: 'always' }),
  pct:  v => v == null ? '—' : (Number(v)).toFixed(2) + '%',
  pctSigned: v => v == null ? '—' : (Number(v) > 0 ? '+' : '') + Number(v).toFixed(2) + '%',
  ratio: v => v == null || v === 9999 ? (v === 9999 ? '∞' : '—') : Number(v).toFixed(2),
  time: v => {
    if (!v) return '—';
    const d = new Date(v);
    return d.toLocaleString('zh-TW', { hour12: false }).replace(/\//g, '-');
  },
};

function cls(val) { return val > 0 ? 'pos' : val < 0 ? 'neg' : 'dim'; }

let equityChart, equitySeries, benchmarkSeries;

function initChart() {
  if (equityChart) return;
  equityChart = LightweightCharts.createChart($('equityChart'), {
    width: $('equityChart').clientWidth,
    height: 320,
    layout: { background: { type: 'solid', color: '#181a20' }, textColor: '#848e9c' },
    grid: { vertLines: { color: '#2b3139' }, horzLines: { color: '#2b3139' } },
    rightPriceScale: { borderColor: '#2b3139' },
    timeScale: { borderColor: '#2b3139', timeVisible: true, secondsVisible: false },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  });
  equitySeries = equityChart.addAreaSeries({
    lineColor: '#0ecb81',
    topColor: 'rgba(14, 203, 129, 0.4)',
    bottomColor: 'rgba(14, 203, 129, 0.0)',
    priceFormat: { type: 'custom', formatter: p => (p >= 0 ? '+' : '') + p.toFixed(2) },
  });
  benchmarkSeries = equityChart.addLineSeries({
    color: '#2b6cb0',
    lineWidth: 2,
    lineStyle: 2,  // dashed
    priceFormat: { type: 'custom', formatter: p => (p >= 0 ? '+' : '') + p.toFixed(2) },
    lastValueVisible: true,
    title: 'Benchmark',
  });
  new ResizeObserver(() => equityChart.applyOptions({ width: $('equityChart').clientWidth })).observe($('equityChart'));
}

function renderBenchmark(curve) {
  initChart();
  if (!curve || curve.length === 0) {
    benchmarkSeries.setData([]);
    return;
  }
  // curve 是 [{at, pnl, equity, returnPct}, ...]；用 pnl 跟 portfolio 同尺度（$ 計價）
  const data = curve.map(p => ({
    time: Math.floor(new Date(p.at || p.At).getTime() / 1000),
    value: Number(p.pnl ?? p.Pnl),
  })).sort((a, b) => a.time - b.time);
  const dedup = [];
  for (const pt of data) {
    if (dedup.length === 0 || dedup[dedup.length - 1].time !== pt.time) dedup.push(pt);
    else dedup[dedup.length - 1] = pt;
  }
  benchmarkSeries.setData(dedup);
}

function renderKPIs(m, bench) {
  const totalPnl = Number(m.totalPnl ?? m.total_pnl ?? 0);
  const benchPnl = bench ? Number(bench.curve?.[bench.curve.length - 1]?.pnl ?? bench.Curve?.[bench.Curve.length - 1]?.Pnl ?? 0) : null;
  const alpha = (bench !== null && benchPnl !== null) ? (totalPnl - benchPnl) : null;

  const k = [
    { label: '總 P&L', value: fmt.money(totalPnl), cls: totalPnl >= 0 ? 'pos' : 'neg' },
    { label: '完成回合', value: fmt.num(m.roundTripCount ?? m.round_trip_count), sub: `總交易 ${fmt.num(m.tradeCount ?? m.trade_count)}` },
    { label: '勝率', value: fmt.pct((m.winRate ?? m.win_rate ?? 0) * 100), sub: `${m.winningTrades ?? m.winning_trades}W / ${m.losingTrades ?? m.losing_trades}L`, cls: (m.winRate ?? m.win_rate) >= 0.5 ? 'pos' : 'warn' },
    { label: '獲利因子', value: fmt.ratio(m.profitFactor ?? m.profit_factor), cls: (m.profitFactor ?? m.profit_factor) > 1 ? 'pos' : 'neg' },
    { label: 'Sharpe', value: fmt.ratio(m.sharpeRatio ?? m.sharpe_ratio), sub: 'Ann.', cls: (m.sharpeRatio ?? m.sharpe_ratio) > 1 ? 'pos' : '' },
    { label: 'Sortino', value: fmt.ratio(m.sortinoRatio ?? m.sortino_ratio), sub: 'Ann.', cls: (m.sortinoRatio ?? m.sortino_ratio) > 1 ? 'pos' : '' },
    { label: 'Max Drawdown', value: fmt.pct(m.maxDrawdownPct ?? m.max_drawdown_pct), sub: fmt.money(-(m.maxDrawdown ?? m.max_drawdown ?? 0)), cls: 'neg' },
    { label: '平均獲利 / 虧損', value: fmt.money(m.avgWin ?? m.avg_win), sub: fmt.money(m.avgLoss ?? m.avg_loss) },
    { label: '最大單筆獲利', value: fmt.money(m.largestWin ?? m.largest_win), cls: 'pos' },
    { label: '最大單筆虧損', value: fmt.money(m.largestLoss ?? m.largest_loss), cls: 'neg' },
  ];

  if (bench) {
    const benchRet = Number(bench.totalReturnPct ?? bench.TotalReturnPct ?? 0);
    k.push({
      label: `基準 (${bench.symbol ?? bench.Symbol})`,
      value: fmt.pctSigned(benchRet),
      sub: fmt.money(benchPnl),
      cls: benchRet >= 0 ? 'pos' : 'neg',
    });
    if (alpha !== null) {
      k.push({
        label: 'Alpha（超額）',
        value: fmt.money(alpha),
        sub: alpha >= 0 ? '🏆 擊敗基準' : '不如直接買入持有',
        cls: alpha >= 0 ? 'pos' : 'neg',
      });
    }
  }

  $('kpiGrid').innerHTML = k.map(x => `
    <div class="kpi ${x.cls || ''}">
      <div class="label">${x.label}</div>
      <div class="value">${x.value}</div>
      ${x.sub ? `<div class="sub">${x.sub}</div>` : ''}
    </div>
  `).join('');
}

function renderEquity(curve) {
  initChart();
  if (!curve || curve.length === 0) {
    $('equityEmpty').style.display = 'block';
    $('equityChart').style.display = 'none';
    equitySeries.setData([]);
    return;
  }
  $('equityEmpty').style.display = 'none';
  $('equityChart').style.display = 'block';
  // lightweight-charts 需要 time 為 unix 秒
  const data = curve.map(p => ({
    time: Math.floor(new Date(p.at || p.At).getTime() / 1000),
    value: Number(p.equity ?? p.Equity),
  })).sort((a, b) => a.time - b.time);
  // 去重 time
  const dedup = [];
  for (const pt of data) {
    if (dedup.length === 0 || dedup[dedup.length - 1].time !== pt.time) dedup.push(pt);
    else dedup[dedup.length - 1] = pt;
  }
  equitySeries.setData(dedup);
  equityChart.timeScale().fitContent();
}

function renderSymbols(rows) {
  const tbody = $('symbolTable').querySelector('tbody');
  if (!rows || rows.length === 0) {
    tbody.innerHTML = '';
    $('symbolEmpty').style.display = 'block';
    return;
  }
  $('symbolEmpty').style.display = 'none';
  tbody.innerHTML = rows.map(r => {
    const pnl = Number(r.pnl ?? r.Pnl);
    const wr = Number(r.winRate ?? r.WinRate) * 100;
    return `
      <tr>
        <td><strong>${r.symbol ?? r.Symbol}</strong></td>
        <td class="num">${fmt.num(r.trades ?? r.Trades)}</td>
        <td class="num">${fmt.pct(wr)}</td>
        <td class="num ${cls(pnl)}">${fmt.money(pnl)}</td>
      </tr>
    `;
  }).join('');
}

function renderRoundTrips(rows) {
  const tbody = $('rtTable').querySelector('tbody');
  if (!rows || rows.length === 0) {
    tbody.innerHTML = '';
    $('rtEmpty').style.display = 'block';
    return;
  }
  $('rtEmpty').style.display = 'none';
  tbody.innerHTML = rows.map(r => {
    const pnl = Number(r.pnl);
    const pnlPct = Number(r.pnl_pct);
    return `
      <tr>
        <td><strong>${r.symbol}</strong></td>
        <td class="dim">${fmt.time(r.exit_at)}</td>
        <td class="num dim">${fmt.num(r.entry_price)} → ${fmt.num(r.exit_price)}</td>
        <td class="num ${cls(pnl)}">${fmt.money(pnl)}</td>
        <td class="num ${cls(pnlPct)}">${fmt.pctSigned(pnlPct)}</td>
      </tr>
    `;
  }).join('');
}

async function load() {
  const exchange = $('exchange').value;
  const limit = $('limit').value;
  const benchSym = $('benchmarkSymbol').value;
  $('main').classList.add('loading');
  try {
    // 平行打兩個端點
    const [metricsResp, benchResp] = await Promise.all([
      fetch(`/api/v1/portfolio/metrics?exchange=${exchange}&limit=${limit}`),
      benchSym ? fetch(`/api/v1/portfolio/benchmark?symbol=${benchSym}&limit=500`) : Promise.resolve(null),
    ]);
    const j = await metricsResp.json();
    if (!j.success) {
      alert('載入失敗: ' + (j.message || 'unknown'));
      return;
    }
    const m = j.data;
    let bench = null;
    if (benchResp) {
      const bj = await benchResp.json();
      if (bj.success) bench = bj.data;
    }
    renderKPIs(m, bench);
    renderEquity(m.equityCurve ?? m.EquityCurve);
    renderBenchmark(bench ? (bench.curve ?? bench.Curve) : null);
    renderSymbols(m.perSymbol ?? m.PerSymbol);
    renderRoundTrips(m.recentRoundTrips ?? m.RecentRoundTrips);
    $('updated').textContent = '更新於 ' + new Date().toLocaleTimeString('zh-TW');
  } catch (e) {
    alert('請求失敗: ' + e.message);
  } finally {
    $('main').classList.remove('loading');
  }
}

$('refresh').addEventListener('click', load);
$('exchange').addEventListener('change', load);
$('limit').addEventListener('change', load);
$('benchmarkSymbol').addEventListener('change', load);

load();
setInterval(load, 30000); // 30 秒自動刷新
</script>
</body>
</html>
