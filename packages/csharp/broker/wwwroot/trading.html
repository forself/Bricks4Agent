<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>B4A 交易監控</title>
<style>
  :root{--bg:#0b0e11;--card:#181a20;--card2:#1e2329;--line:#2b3139;--txt:#eaecef;--mut:#848e9c;--grn:#0ecb81;--red:#f6465d;--yel:#f0b90b;--blu:#3a8bfd;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:14px/1.5 -apple-system,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;padding:18px;max-width:1180px;margin:0 auto}
  a{color:var(--blu);text-decoration:none}
  .muted{color:var(--mut)}.grn{color:var(--grn)}.red{color:var(--red)}.yel{color:var(--yel)}
  h1{font-size:18px;font-weight:600;display:flex;align-items:center;gap:10px}
  h2{font-size:13px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin:22px 0 10px}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
  .b-buy{background:rgba(14,203,129,.15);color:var(--grn)}.b-sell{background:rgba(246,70,93,.15);color:var(--red)}.b-hold{background:rgba(132,142,156,.15);color:var(--mut)}
  .kpis{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:12px;margin-top:6px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .kpi .lab{font-size:12px;color:var(--mut)}.kpi .big{font-size:28px;font-weight:700;margin-top:4px}
  .gauge{height:10px;background:var(--card2);border-radius:6px;overflow:hidden;margin-top:12px}
  .gauge>span{display:block;height:100%;border-radius:6px}
  .legs{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .leg{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
  .leg.core{border-color:#3a4252;box-shadow:inset 0 0 0 1px rgba(240,185,11,.15)}
  .leg .hd{display:flex;justify-content:space-between;align-items:center}
  .leg .sym{font-size:16px;font-weight:700}.leg .strat{font-size:12px;color:var(--mut)}
  .leg .row{display:flex;justify-content:space-between;margin-top:9px;font-size:13px}
  .leg .status{font-size:12px;color:var(--mut);margin-top:8px;min-height:16px}
  .bar{height:6px;background:var(--card2);border-radius:4px;overflow:hidden;margin-top:6px}
  .bar>span{display:block;height:100%}
  .pmap{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .pmrow{display:grid;grid-template-columns:78px 1fr 120px;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
  .pmrow:last-child{border:0}
  .track{position:relative;height:26px;background:var(--card2);border-radius:6px}
  .track .mk{position:absolute;top:-3px;width:2px;height:32px}
  .track .lab{position:absolute;top:6px;font-size:10px;color:var(--mut);transform:translateX(-50%);white-space:nowrap}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  td,th{text-align:left;padding:5px 4px;border-bottom:1px solid var(--line)}th{color:var(--mut);font-weight:500;font-size:11px}
  .pill{font-size:11px;color:var(--mut);background:var(--card2);padding:2px 7px;border-radius:8px;margin-right:4px;display:inline-block;margin-top:4px}
  .note{font-size:11px;color:var(--mut);margin-top:6px}
  .links{font-size:12px;margin-top:18px;text-align:center;color:var(--mut)}
  .links a{margin:0 8px}
</style>
</head>
<body>
<div class="topbar">
  <h1>🟢 B4A 交易監控</h1>
  <div class="muted" style="font-size:12px" id="status">載入中…</div>
</div>
<div class="kpis" id="kpis"></div>
<h2>真錢書 <span id="legcount" class="muted"></span></h2>
<div class="legs" id="legs"></div>
<h2>保護地圖 · 強平 / SL / 進場 / 現價</h2>
<div class="pmap" id="pmap"></div>
<h2>實驗場 · 配置建議</h2>
<div class="two">
  <div class="panel" id="xsmom"></div>
  <div class="panel" id="forward"></div>
</div>
<div class="links">
  進階功能(已移出此頁):
  <a href="/trading-manage.html">⚙️ 管理控制台(加減 / 武裝 / 告警)</a> ·
  <a href="/strategy-lab.html">策略 / 回測 Lab</a> ·
  <a href="/line-admin.html">憑證 / 用戶 / 設定</a> ·
  <a href="/trading-legacy.html">舊版完整面板</a>
</div>

<script>
const fmt=(n,d=2)=>Number(n||0).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d});
const sign=n=>(n>=0?'+':'')+fmt(n);
const cls=n=>n>=0?'grn':'red';
const esc=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const short=(s,n=46)=>{s=s||'';return s.length>n?s.slice(0,n)+'…':s;};
const sym=s=>(s||'').replace('-USDT','').replace('USDT','');

function badge(sig){const c=sig==='buy'?'b-buy':sig==='sell'?'b-sell':'b-hold';return `<span class="badge ${c}">${esc(sig)}</span>`;}

function renderKPI(a){
  const ex=a.exposure_x||0, exPct=Math.min(100,ex/3*100);
  document.getElementById('kpis').innerHTML=`
   <div class="kpi"><div class="lab">總權益 (BingX 真錢)</div>
     <div class="big">${fmt(a.balance)} <span class="muted" style="font-size:15px">USDT</span></div>
     <div style="margin-top:4px"><span class="${cls(a.day_pnl)}">${sign(a.day_pnl)} 今日已實現</span></div></div>
   <div class="kpi"><div class="lab">有效曝險 / 上限 3.0x</div>
     <div class="big">${fmt(ex)}<span class="muted" style="font-size:15px">x</span></div>
     <div class="gauge"><span style="width:${exPct}%;background:linear-gradient(90deg,var(--blu),var(--grn))"></span></div></div>
   <div class="kpi"><div class="lab">今日 P&L</div>
     <div class="big ${cls(a.day_pnl)}">${sign(a.day_pnl)}</div>
     <div class="note">${a.day_trades||0} 筆已實現成交</div></div>`;
}

function renderLegs(legs){
  document.getElementById('legcount').textContent=`· ${legs.length} 腿`;
  document.getElementById('legs').innerHTML=legs.map(l=>{
    const core=l.budget_pct>=100;
    const pos=l.has_position?`<span class="${l.side==='short'?'red':'grn'}">● ${l.side} @${fmt(l.entry,l.entry<10?4:1)}</span>`:'○ 空手';
    const pnl=l.has_position?` · <span class="${cls(l.pnl_pct)}">${sign(l.pnl_pct)}%</span>`:'';
    const barW=Math.min(100,l.budget_pct);
    const barC=l.has_position?(l.side==='short'?'var(--red)':'var(--grn)'):(core?'var(--yel)':'var(--mut)');
    return `<div class="leg ${core?'core':''}">
      <div class="hd"><div><span class="sym">${sym(l.symbol)}</span> ${core?'<span class="muted">◆核心</span>':''}
        <div class="strat">${esc(l.strategy)} · ${esc(l.mode||'')}</div></div>${badge(l.signal)}</div>
      <div class="row"><span class="muted">持倉</span><span>${pos}${pnl}</span></div>
      <div class="row"><span class="muted">預算</span><span>${fmt(l.budget_pct,0)}%</span></div>
      <div class="bar"><span style="width:${barW}%;background:${barC}"></span></div>
      <div class="status">${esc(short((l.last_action?l.last_action+': ':'')+l.last_reason)||'—')}</div></div>`;
  }).join('');
}

function renderProtection(legs){
  const open=legs.filter(l=>l.has_position);
  if(!open.length){document.getElementById('pmap').innerHTML='<div class="muted">目前無持倉</div>';return;}
  document.getElementById('pmap').innerHTML=open.map(l=>{
    const isShort=l.side==='short';
    const pts=[l.liq,l.sl,l.entry,l.mark].filter(x=>x>0);
    let lo=Math.min(...pts), hi=Math.max(...pts); const pad=(hi-lo)*0.12||hi*0.05; lo-=pad; hi+=pad;
    const pos=v=>v>0?Math.max(2,Math.min(98,(v-lo)/(hi-lo)*100)):-99;
    const mk=(v,c,txt,top)=>v>0?`<span class="mk" style="left:${pos(v)}%;background:${c};${c==='var(--grn)'?'height:34px':''}"></span><span class="lab" style="left:${pos(v)}%;${top?'top:30px':''}">${txt}</span>`:'';
    const dp=l.pnl_pct, sld=l.sl>0?Math.abs((l.mark-l.sl)/l.mark*100):null;
    return `<div class="pmrow">
      <div><b>${sym(l.symbol)}</b><div class="muted" style="font-size:11px">${l.side}</div></div>
      <div class="track">
        ${mk(l.liq,'var(--red)','強平',true)}
        ${mk(l.sl,'var(--yel)','SL',false)}
        ${mk(l.entry,'var(--mut)','進場',true)}
        ${mk(l.mark,'var(--grn)','現價',false)}</div>
      <div style="text-align:right"><span class="${cls(dp)}">${sign(dp)}%</span>
        <div class="muted" style="font-size:11px">${sld!=null?'距 SL '+fmt(sld,1)+'%':''}</div></div></div>`;
  }).join('');
}

function renderXsmom(x){
  const el=document.getElementById('xsmom');
  if(!x){el.innerHTML='<b>🧪 xsmom shadow</b><div class="muted note">尚未啟動或無資料</div>';return;}
  const eq=x.Equity??x.equity??1, pr=x.LastPeriodRet??x.lastPeriodRet??0, per=x.Periods??x.periods??0;
  const L=(x.Long??x.long??[]).map(p=>sym(p.Coin??p.coin)), S=(x.Short??x.short??[]).map(p=>sym(p.Coin??p.coin));
  const started=new Date(x.StartedUtc??x.startedUtc??Date.now()); const days=Math.max(0,(Date.now()-started)/864e5);
  const tot=(eq-1)*100;
  el.innerHTML=`<div style="display:flex;justify-content:space-between"><b>🧪 xsmom shadow</b><span class="muted">每7d rebal · 不下單</span></div>
    <div style="margin-top:8px"><span class="big ${cls(tot)}" style="font-size:24px;font-weight:700">${sign(tot)}%</span>
      <span class="muted"> 起算 ${fmt(days,0)} 天 · ${per} 期 · 本期 <span class="${cls(pr*100)}">${sign(pr*100)}%</span></span></div>
    <div style="margin-top:8px"><span class="pill">📈 long ${L.join(' ')}</span></div>
    <div><span class="pill">📉 short ${S.join(' ')}</span></div>
    <div class="note">與 decorr4 低相關 · 站得住才考慮真錢</div>`;
}

function renderForward(fw){
  const el=document.getElementById('forward');
  const rows=(fw||[]).slice(0,8).map(f=>`<tr><td>${esc(f.strategy)}</td><td>${(f.exchanges||[]).join(',')}</td><td>${f.trades}</td>
    <td class="${cls(f.realized_pnl)}">${sign(f.realized_pnl)}</td></tr>`).join('')
    || '<tr><td colspan="4" class="muted" style="text-align:center">尚無已實現成交(round-trip 累積中)</td></tr>';
  el.innerHTML=`<div style="display:flex;justify-content:space-between"><b>📊 forward 實盤 P&L</b><span class="muted">真錢+paper(FIFO)</span></div>
    <table style="margin-top:6px"><tr><th>策略</th><th>場</th><th>成交</th><th>realized</th></tr>${rows}</table>
    <div class="note">≥10 筆且賠 → forward 否決(進 --allocate 閘)</div>`;
}

async function load(){
  try{
    const r=await fetch('/api/v1/auto-trader/dashboard?exchange=bingx',{credentials:'same-origin'});
    const j=await r.json(); const d=j.data||j;
    renderKPI(d.account||{}); renderLegs(d.legs||[]); renderProtection(d.legs||[]);
    renderXsmom(d.xsmom); renderForward(d.forward);
    document.getElementById('status').innerHTML=`<span class="dot" style="background:var(--grn)"></span> 更新 ${new Date().toLocaleTimeString()}`;
  }catch(e){ document.getElementById('status').innerHTML=`<span class="dot" style="background:var(--red)"></span> 載入失敗: ${esc(String(e))}`; }
}
load(); setInterval(load,15000);
</script>
</body>
</html>
