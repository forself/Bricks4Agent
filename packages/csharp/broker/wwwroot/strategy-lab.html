<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>B4A Strategy Lab · 策略對決</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root {
    --bg-0: #0b0e11;
    --bg-1: #181a20;
    --bg-2: #1e2026;
    --border: #2b3139;
    --text: #eaecef;
    --text-dim: #848e9c;
    --green: #0ecb81;
    --red: #f6465d;
    --yellow: #fcd535;
    --blue: #2b6cb0;
    --gold: #f0b90b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg-0);
    color: var(--text);
    font-size: 14px;
  }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .tag { color: var(--text-dim); font-size: 12px; }
  header .spacer { flex: 1; }
  header input, header select, header button {
    background: var(--bg-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
  }
  header input { width: 90px; text-transform: uppercase; font-variant-numeric: tabular-nums; }
  header button { cursor: pointer; }
  header button:hover { background: var(--border); }
  header button.primary { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 600; }
  header button.primary:hover { filter: brightness(1.1); }
  header .status { color: var(--text-dim); font-size: 12px; min-width: 120px; }

  main { padding: 20px 24px; max-width: 1600px; margin: 0 auto; }

  .winners {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .winner {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .winner .label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .winner .name  { font-size: 18px; font-weight: 600; margin-top: 6px; color: var(--gold); }
  .winner .sub   { color: var(--text-dim); font-size: 11px; margin-top: 4px; }

  .section {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 20px;
  }
  .section h2 {
    margin: 0;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    font-weight: 600;
    display: flex; justify-content: space-between; align-items: center;
  }
  .section h2 .hint { color: var(--text-dim); font-size: 11px; font-weight: normal; }
  .section-body { padding: 16px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left;
    color: var(--text-dim);
    font-weight: 500;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    user-select: none;
  }
  thead th.num { text-align: right; }
  thead th:hover { color: var(--text); }
  thead th.sort-asc::after  { content: ' ▲'; color: var(--gold); }
  thead th.sort-desc::after { content: ' ▼'; color: var(--gold); }
  tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  tbody td.num { text-align: right; }
  tbody tr:hover { background: var(--bg-2); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr.winner-row { background: rgba(240, 185, 11, 0.08); }
  tbody tr.winner-row td:first-child::before { content: '🏆 '; }

  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .dim { color: var(--text-dim); }

  #chart { height: 400px; }
  .legend {
    display: flex; flex-wrap: wrap; gap: 14px;
    padding: 8px 16px; font-size: 12px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 3px 8px; border-radius: 4px; }
  .legend-item.off { opacity: 0.4; }
  .legend-item:hover { background: var(--bg-2); }
  .legend-swatch { width: 14px; height: 3px; border-radius: 2px; }

  .empty { text-align: center; padding: 40px; color: var(--text-dim); }
  .loading { opacity: 0.5; pointer-events: none; }
</style>
</head>
<body>

<header>
  <h1>🔬 Strategy Lab</h1>
  <span class="tag">B4A Trading · 策略對決</span>
  <div class="spacer"></div>
  <label class="dim" style="font-size:12px;">Symbol</label>
  <input id="symbolInput" value="AAPL" placeholder="AAPL" />
  <label class="dim" style="font-size:12px;">K 線數</label>
  <select id="limit">
    <option value="100">100</option>
    <option value="200">200</option>
    <option value="300" selected>300</option>
    <option value="500">500</option>
    <option value="1000">1000</option>
  </select>
  <label class="dim" style="font-size:12px;">起始資金</label>
  <select id="cash">
    <option value="10000">$10k</option>
    <option value="100000" selected>$100k</option>
    <option value="1000000">$1M</option>
  </select>
  <button id="run" class="primary">▶ 跑比較</button>
  <span class="status" id="status">就緒</span>
</header>

<main id="main">
  <div id="winnersBox" class="winners"></div>

  <div class="section">
    <h2>排行榜 <span class="hint">點欄位可重新排序</span></h2>
    <div class="section-body" style="padding:0;">
      <table id="rankTable">
        <thead>
          <tr>
            <th data-col="rank">排名</th>
            <th data-col="strategy">策略</th>
            <th class="num" data-col="totalReturnPct">報酬 %</th>
            <th class="num" data-col="sharpeRatio">Sharpe</th>
            <th class="num" data-col="maxDrawdownPct">MaxDD %</th>
            <th class="num" data-col="winRate">勝率 %</th>
            <th class="num" data-col="totalTrades">交易數</th>
            <th class="num" data-col="profitFactor">獲利因子</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div id="tableEmpty" class="empty" style="display:none;">按「跑比較」開始</div>
    </div>
  </div>

  <div class="section">
    <h2>權益曲線 <span class="hint">$10k 起始・可點圖例開關</span></h2>
    <div class="section-body" style="padding:0;">
      <div id="legend" class="legend"></div>
      <div id="chart"></div>
      <div id="chartEmpty" class="empty" style="display:none;">按「跑比較」開始</div>
    </div>
  </div>
</main>

<script>
const $ = id => document.getElementById(id);
const fmt = {
  num: v => v == null ? '—' : Number(v).toLocaleString('en-US', { maximumFractionDigits: 2 }),
  pct: v => v == null ? '—' : Number(v).toFixed(2),
  ratio: v => v == null ? '—' : Number(v).toFixed(2),
};

const STRATEGY_COLORS = {
  ensemble:         '#f0b90b',
  composite:        '#2b6cb0',
  sma_cross:        '#0ecb81',
  rsi_oversold:     '#f6465d',
  macd_divergence:  '#9b59b6',
  multi_timeframe:  '#1abc9c',
  llm:              '#e67e22',
  news_sentiment:   '#e84393',
};

let chart, seriesByStrategy = {};
let lastResult = null;
let sortCol = 'sharpeRatio';
let sortAsc = false;

function initChart() {
  if (chart) return;
  chart = LightweightCharts.createChart($('chart'), {
    width: $('chart').clientWidth,
    height: 400,
    layout: { background: { type: 'solid', color: '#181a20' }, textColor: '#848e9c' },
    grid: { vertLines: { color: '#2b3139' }, horzLines: { color: '#2b3139' } },
    rightPriceScale: { borderColor: '#2b3139' },
    timeScale: { borderColor: '#2b3139', timeVisible: true, secondsVisible: false },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  });
  new ResizeObserver(() => chart.applyOptions({ width: $('chart').clientWidth })).observe($('chart'));
}

function renderWinners(winnerBy) {
  const labels = {
    sharpe:        ['🎯 最佳 Sharpe',    'risk-adjusted return'],
    return:        ['📈 最高報酬',        'total return %'],
    drawdown:      ['🛡 最低回撤',        'max drawdown'],
    winrate:       ['🎰 最高勝率',        'win rate'],
    profit_factor: ['💰 最佳獲利因子',    'gross profit / loss'],
  };
  const items = Object.entries(winnerBy || {}).map(([key, name]) => {
    const [title, sub] = labels[key] || [key, ''];
    return `<div class="winner">
      <div class="label">${title}</div>
      <div class="name">${name}</div>
      <div class="sub">${sub}</div>
    </div>`;
  });
  $('winnersBox').innerHTML = items.join('');
}

function renderTable(ranked, winnerBy) {
  const tbody = $('rankTable').querySelector('tbody');
  if (!ranked || ranked.length === 0) {
    tbody.innerHTML = '';
    $('tableEmpty').style.display = 'block';
    return;
  }
  $('tableEmpty').style.display = 'none';

  // sort
  const sorted = [...ranked].sort((a, b) => {
    const av = a[sortCol], bv = b[sortCol];
    if (typeof av === 'string') return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    return sortAsc ? (av - bv) : (bv - av);
  });

  const winnerSet = new Set(Object.values(winnerBy || {}));
  tbody.innerHTML = sorted.map((e, i) => {
    const isWinner = winnerSet.has(e.strategy);
    const retClass = e.totalReturnPct > 0 ? 'pos' : e.totalReturnPct < 0 ? 'neg' : 'dim';
    const sharpeClass = e.sharpeRatio > 1 ? 'pos' : e.sharpeRatio < 0 ? 'neg' : '';
    return `
      <tr class="${isWinner ? 'winner-row' : ''}">
        <td>#${e.rank}</td>
        <td><strong style="color:${STRATEGY_COLORS[e.strategy] || '#eaecef'};">${e.strategy}</strong></td>
        <td class="num ${retClass}">${fmt.pct(e.totalReturnPct)}</td>
        <td class="num ${sharpeClass}">${fmt.ratio(e.sharpeRatio)}</td>
        <td class="num neg">${fmt.pct(e.maxDrawdownPct)}</td>
        <td class="num">${fmt.pct(e.winRate)}</td>
        <td class="num">${e.totalTrades}</td>
        <td class="num">${fmt.ratio(e.profitFactor)}</td>
      </tr>`;
  }).join('');

  // 更新表頭排序箭頭
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === sortCol) th.classList.add(sortAsc ? 'sort-asc' : 'sort-desc');
  });
}

function renderChart(ranked) {
  initChart();
  // 清掉舊 series
  Object.values(seriesByStrategy).forEach(s => chart.removeSeries(s));
  seriesByStrategy = {};

  if (!ranked || ranked.length === 0) {
    $('chartEmpty').style.display = 'block';
    $('chart').style.display = 'none';
    $('legend').innerHTML = '';
    return;
  }
  $('chartEmpty').style.display = 'none';
  $('chart').style.display = 'block';

  const legendItems = [];
  for (const e of ranked) {
    if (!e.equityCurve || e.equityCurve.length === 0) continue;
    const color = STRATEGY_COLORS[e.strategy] || '#848e9c';
    const s = chart.addLineSeries({
      color,
      lineWidth: e.strategy === 'ensemble' ? 3 : 2,
      priceFormat: { type: 'custom', formatter: p => p.toFixed(0) },
      title: e.strategy,
    });
    const data = e.equityCurve.map(p => ({
      time: Math.floor(new Date(p.at || p.At).getTime() / 1000),
      value: Number(p.value ?? p.Value),
    })).sort((a, b) => a.time - b.time);
    const dedup = [];
    for (const pt of data) {
      if (dedup.length === 0 || dedup[dedup.length - 1].time !== pt.time) dedup.push(pt);
      else dedup[dedup.length - 1] = pt;
    }
    s.setData(dedup);
    seriesByStrategy[e.strategy] = s;
    legendItems.push({ strategy: e.strategy, color, series: s });
  }

  $('legend').innerHTML = legendItems.map(li =>
    `<div class="legend-item" data-strategy="${li.strategy}">
      <div class="legend-swatch" style="background:${li.color};"></div>
      <span>${li.strategy}</span>
    </div>`
  ).join('');

  // legend 點擊切換可見性
  $('legend').querySelectorAll('.legend-item').forEach(el => {
    el.addEventListener('click', () => {
      el.classList.toggle('off');
      const s = seriesByStrategy[el.dataset.strategy];
      if (!s) return;
      s.applyOptions({ visible: !el.classList.contains('off') });
    });
  });

  chart.timeScale().fitContent();
}

async function run() {
  const symbol = $('symbolInput').value.trim().toUpperCase() || 'AAPL';
  const limit = $('limit').value;
  const cash = $('cash').value;
  $('main').classList.add('loading');
  $('status').textContent = '計算中…';
  try {
    const r = await fetch(`/api/v1/strategy/compare?symbol=${encodeURIComponent(symbol)}&limit=${limit}&initial_cash=${cash}`);
    const j = await r.json();
    if (!j.success) {
      $('status').textContent = '失敗';
      alert('失敗：' + (j.message || 'unknown'));
      return;
    }
    lastResult = j.data;
    renderWinners(lastResult.winnerBy);
    renderTable(lastResult.ranked, lastResult.winnerBy);
    renderChart(lastResult.ranked);
    $('status').textContent = `${lastResult.totalBars} bars · ${lastResult.ranked.length} 策略`;
  } catch (e) {
    $('status').textContent = '錯誤';
    alert('請求失敗：' + e.message);
  } finally {
    $('main').classList.remove('loading');
  }
}

// 表頭點擊排序
document.querySelectorAll('thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (!col) return;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = false; }
    if (lastResult) renderTable(lastResult.ranked, lastResult.winnerBy);
  });
});

$('run').addEventListener('click', run);
$('symbolInput').addEventListener('keydown', e => { if (e.key === 'Enter') run(); });

// 自動跑一次
run();
</script>
</body>
</html>
