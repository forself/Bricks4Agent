# 單機模擬 3 節點 failover demo。全本地、免費、可重現、不碰任何 prod。
# 3 etcd = quorum/見證層(對應 筆電+2VPS);node-a/b = 主/備 broker 實例。
name: fsim
networks:
  net:
    name: fsim-net

services:
  etcd1:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: fsim-etcd1
    networks: [net]
    command: >
      etcd --name etcd1 --initial-cluster-token fsim --initial-cluster-state new
      --initial-cluster etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      --listen-peer-urls http://0.0.0.0:2380 --initial-advertise-peer-urls http://etcd1:2380
      --listen-client-urls http://0.0.0.0:2379 --advertise-client-urls http://etcd1:2379
  etcd2:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: fsim-etcd2
    networks: [net]
    command: >
      etcd --name etcd2 --initial-cluster-token fsim --initial-cluster-state new
      --initial-cluster etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      --listen-peer-urls http://0.0.0.0:2380 --initial-advertise-peer-urls http://etcd2:2380
      --listen-client-urls http://0.0.0.0:2379 --advertise-client-urls http://etcd2:2379
  etcd3:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: fsim-etcd3
    networks: [net]
    command: >
      etcd --name etcd3 --initial-cluster-token fsim --initial-cluster-state new
      --initial-cluster etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      --listen-peer-urls http://0.0.0.0:2380 --initial-advertise-peer-urls http://etcd3:2380
      --listen-client-urls http://0.0.0.0:2379 --advertise-client-urls http://etcd3:2379

  node-a:
    build: .
    container_name: fsim-node-a
    networks: [net]
    environment: { NODE_ID: A, ETCD: "etcd1:2379,etcd2:2379,etcd3:2379", LEASE_TTL: "5" }
    depends_on: [etcd1, etcd2, etcd3]
  node-b:
    build: .
    container_name: fsim-node-b
    networks: [net]
    environment: { NODE_ID: B, ETCD: "etcd1:2379,etcd2:2379,etcd3:2379", LEASE_TTL: "5" }
    depends_on: [etcd1, etcd2, etcd3]
