<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>UI Test Runner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; }
        #frame-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #test-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
        #log-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 200px;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            font-size: 12px;
            overflow-y: auto;
            padding: 10px;
            display: none;
        }
        #log-panel.show { display: block; }
        .log-entry { margin: 2px 0; }
        .log-error { color: #f66; }
        .log-warn { color: #ff0; }
    </style>
</head>
<body>
    <div id="frame-container">
        <iframe id="test-frame"></iframe>
    </div>
    <div id="log-panel"></div>

    <script>
        // 從 URL 參數讀取測試配置
        const params = new URLSearchParams(window.location.search);
        const targetUrl = params.get('url') || '';
        const actions = params.get('actions') ? JSON.parse(decodeURIComponent(params.get('actions'))) : [];
        const showLogs = params.get('logs') === 'true';

        const logPanel = document.getElementById('log-panel');
        const frame = document.getElementById('test-frame');

        // 日誌收集
        const logs = [];

        function addLog(type, ...args) {
            const entry = { type, message: args.map(a => String(a)).join(' '), time: Date.now() };
            logs.push(entry);

            if (showLogs) {
                logPanel.classList.add('show');
                const div = document.createElement('div');
                div.className = `log-entry log-${type}`;
                div.textContent = `[${type}] ${entry.message}`;
                logPanel.appendChild(div);
                logPanel.scrollTop = logPanel.scrollHeight;
            }

            // 輸出到控制台（會被 Chrome headless 捕獲）
            console.log(`[TEST:${type.toUpperCase()}] ${entry.message}`);
        }

        // 監聽 iframe 內的錯誤和日誌
        function setupFrameLogging(frameWindow) {
            const originalConsole = frameWindow.console;
            frameWindow.console = {
                log: (...args) => { addLog('log', ...args); originalConsole.log(...args); },
                error: (...args) => { addLog('error', ...args); originalConsole.error(...args); },
                warn: (...args) => { addLog('warn', ...args); originalConsole.warn(...args); },
                info: (...args) => { addLog('info', ...args); originalConsole.info(...args); },
            };

            frameWindow.onerror = (msg, src, line, col, error) => {
                addLog('error', `${msg} at ${src}:${line}:${col}`);
            };
        }

        // 執行動作
        async function executeActions(frameDoc, frameWindow) {
            for (const action of actions) {
                addLog('action', `執行: ${action.type} ${action.selector || action.value || ''}`);

                try {
                    switch (action.type) {
                        case 'wait':
                            await new Promise(r => setTimeout(r, action.value || 1000));
                            break;

                        case 'click':
                            const clickTarget = frameDoc.querySelector(action.selector);
                            if (clickTarget) {
                                clickTarget.click();
                                addLog('log', `點擊成功: ${action.selector}`);
                            } else {
                                addLog('error', `找不到元素: ${action.selector}`);
                            }
                            break;

                        case 'click-text':
                            // 根據文字內容點擊
                            const allElements = frameDoc.querySelectorAll('button, a, [role="button"]');
                            let found = false;
                            for (const el of allElements) {
                                if (el.textContent.includes(action.value)) {
                                    el.click();
                                    addLog('log', `點擊成功 (文字匹配): "${action.value}"`);
                                    found = true;
                                    break;
                                }
                            }
                            if (!found) {
                                addLog('error', `找不到包含文字的元素: "${action.value}"`);
                            }
                            break;

                        case 'type':
                            const input = frameDoc.querySelector(action.selector);
                            if (input) {
                                input.value = action.value;
                                input.dispatchEvent(new Event('input', { bubbles: true }));
                                addLog('log', `輸入成功: ${action.selector}`);
                            } else {
                                addLog('error', `找不到輸入元素: ${action.selector}`);
                            }
                            break;

                        case 'screenshot-marker':
                            // 標記截圖時間點
                            addLog('screenshot', action.value || 'screenshot');
                            break;

                        case 'eval':
                            // 執行自訂 JavaScript
                            const result = frameWindow.eval(action.value);
                            addLog('log', `Eval 結果: ${result}`);
                            break;

                        case 'check-element':
                            const checkEl = frameDoc.querySelector(action.selector);
                            if (checkEl) {
                                addLog('log', `✅ 元素存在: ${action.selector}`);
                                if (action.property) {
                                    const propValue = checkEl[action.property] || checkEl.getAttribute(action.property);
                                    addLog('log', `   ${action.property} = ${propValue}`);
                                }
                            } else {
                                addLog('error', `❌ 元素不存在: ${action.selector}`);
                            }
                            break;

                        case 'list-buttons':
                            // 列出所有按鈕
                            const buttons = frameDoc.querySelectorAll('button');
                            addLog('log', `找到 ${buttons.length} 個按鈕:`);
                            buttons.forEach((btn, i) => {
                                addLog('log', `  [${i}] "${btn.textContent.trim().substring(0, 50)}"`);
                            });
                            break;
                    }
                } catch (e) {
                    addLog('error', `動作失敗: ${e.message}`);
                }

                // 每個動作後等待一下
                await new Promise(r => setTimeout(r, 100));
            }
        }

        // 主流程
        async function run() {
            if (!targetUrl) {
                addLog('error', '未指定目標 URL');
                return;
            }

            addLog('log', `載入: ${targetUrl}`);
            frame.src = targetUrl;

            frame.onload = async () => {
                addLog('log', '頁面載入完成');

                try {
                    const frameDoc = frame.contentDocument || frame.contentWindow.document;
                    const frameWindow = frame.contentWindow;

                    // 設定日誌攔截
                    setupFrameLogging(frameWindow);

                    // 等待一下讓頁面初始化
                    await new Promise(r => setTimeout(r, 500));

                    // 執行測試動作
                    if (actions.length > 0) {
                        await executeActions(frameDoc, frameWindow);
                    }

                    addLog('log', '測試完成');
                    addLog('result', JSON.stringify({ success: true, logs }));

                } catch (e) {
                    addLog('error', `執行錯誤: ${e.message}`);
                    // 可能是跨域問題
                    if (e.message.includes('cross-origin')) {
                        addLog('warn', '注意: 跨域限制，無法存取 iframe 內容');
                    }
                }
            };

            frame.onerror = (e) => {
                addLog('error', `iframe 載入失敗: ${e}`);
            };
        }

        run();
    </script>
</body>
</html>
