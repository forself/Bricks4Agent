services:
  mock-ollama:
    image: bricks4agent-mock-ollama:latest
    build:
      context: ../../..
      dockerfile: tools/agent/container/mock-ollama.Containerfile
    environment:
      PORT: "11434"
      MOCK_MODEL: "${STACK_MODEL:-stack-test-model}"
      MOCK_RESPONSE_TEXT: "${STACK_RESPONSE_TEXT:-STACK_OK}"
      MOCK_TOOL_CALL: "${STACK_TOOL_CALL:-}"
      MOCK_TOOL_PATH: "${STACK_TOOL_PATH:-README.md}"
    ports:
      - "${STACK_LLM_PORT:-11434}:11434"
    networks:
      - control-net

  broker:
    image: bricks4agent-broker:latest
    build:
      context: ../../..
      dockerfile: packages/csharp/broker/Containerfile
    depends_on:
      - mock-ollama
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:5000"
      Database__Path: "/data/broker.db"
      HighLevelCoordinator__AccessRoot: "/data/workspaces"
      Broker__ScopedToken__Secret: "${BROKER_SCOPED_TOKEN_SECRET:-THIS_IS_A_DEVELOPMENT_ONLY_SCOPED_TOKEN_SECRET_32B}"
      Broker__Encryption__MasterKeyBase64: "${BROKER_MASTER_KEY_BASE64:-BEjqln/N4iLKmxh5ltylZvLxax+iQc+m9T+1BkAz1+w=}"
      Broker__Encryption__EcdhPrivateKeyBase64: "${BROKER_ECDH_PRIVATE_KEY_BASE64:-MIGHAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBG0wawIBAQQg+oxf+eIdOKgNveCoXr8rgrh/9NAtuBSto3XjXjajsW+hRANCAAS8WmQxu8c1Nwb+P8uoewmd9/gHlz/2i6pUZ+/WrMD+YiKf+mkfND1V37tF9eImxrlJGpMW5NR5vuk5dLRKuFWl}"
      Embedding__Enabled: "false"
      RagSeed__Enabled: "false"
      LineChatGateway__RagEnabled: "false"
      WorkerAuth__Enforce: "${WORKER_AUTH_ENFORCE:-false}"
      WorkerAuth__Credentials__0__WorkerType: "line-worker"
      WorkerAuth__Credentials__0__KeyId: "${LINE_WORKER_AUTH_KEY_ID:-line-worker-dev-key}"
      WorkerAuth__Credentials__0__SharedSecret: "${LINE_WORKER_AUTH_SHARED_SECRET:-line-worker-dev-shared-secret}"
      WorkerAuth__Credentials__0__Status: "active"
      WorkerAuth__Credentials__1__WorkerType: "file-worker"
      WorkerAuth__Credentials__1__KeyId: "${FILE_WORKER_AUTH_KEY_ID:-file-worker-dev-key}"
      WorkerAuth__Credentials__1__SharedSecret: "${FILE_WORKER_AUTH_SHARED_SECRET:-file-worker-dev-shared-secret}"
      WorkerAuth__Credentials__1__Status: "active"
      # ── LLM Proxy ──
      LlmProxy__Enabled: "true"
      LlmProxy__Provider: "ollama"
      LlmProxy__BaseUrl: "http://mock-ollama:11434"
      LlmProxy__ApiFormat: "chat"
      LlmProxy__DefaultModel: "${STACK_MODEL:-stack-test-model}"
      LlmProxy__AllowModelOverride: "false"
      LlmProxy__SupportsToolCalling: "true"
      LlmProxy__StreamingEnabled: "false"
      LlmProxy__TimeoutSeconds: "60"
      # ── Development Seed ──
      DevelopmentSeed__Enabled: "true"
      DevelopmentSeed__PrincipalId: "${BROKER_PRINCIPAL_ID:-prn_podman_dev}"
      DevelopmentSeed__DisplayName: "Podman Development Principal"
      DevelopmentSeed__ActorType: "AI"
      DevelopmentSeed__TaskId: "${BROKER_TASK_ID:-task_podman_dev}"
      DevelopmentSeed__TaskType: "${BROKER_TASK_TYPE:-analysis}"
      DevelopmentSeed__AssignedRoleId: "${BROKER_ROLE_ID:-role_reader}"
      DevelopmentSeed__RuntimeDescriptor: >-
        {"llm":{"default_model":"${STACK_MODEL:-stack-test-model}","allow_model_override":false,"supports_tool_calling":true,"streaming_enabled":false},"capability_grants":[{"capability_id":"file.read","scope":{"paths":["/workspace"],"routes":["read_file"]},"quota":-1},{"capability_id":"file.list","scope":{"paths":["/workspace"],"routes":["list_directory"]},"quota":-1},{"capability_id":"file.search","scope":{"paths":["/workspace"],"routes":["search_files","search_content"]},"quota":-1},{"capability_id":"file.write","scope":{"paths":["/workspace"],"routes":["write_file"]},"quota":100},{"capability_id":"line.message.send","scope":{"routes":["send_line_message"]},"quota":-1},{"capability_id":"line.notification.send","scope":{"routes":["send_line_notification"]},"quota":-1},{"capability_id":"line.message.read","scope":{"routes":["read_line_messages"]},"quota":-1},{"capability_id":"line.approval.request","scope":{"routes":["request_line_approval"]},"quota":-1},{"capability_id":"line.audio.send","scope":{"routes":["send_line_audio"]},"quota":-1}]}
      # ── Function Pool (Worker TCP Dispatch) ──
      FunctionPool__Enabled: "true"
      FunctionPool__ListenPort: "7000"
      FunctionPool__StrictMode: "${POOL_STRICT_MODE:-false}"
      FunctionPool__DispatchTimeoutSeconds: "30"
      FunctionPool__MaxRetries: "2"
      FunctionPool__MaxWorkers: "100"
      # ── Container Manager ──
      FunctionPool__ContainerManager__Enabled: "${CONTAINER_MANAGER_ENABLED:-false}"
      FunctionPool__ContainerManager__Runtime: "${CONTAINER_RUNTIME:-docker}"
      FunctionPool__ContainerManager__NetworkName: "bricks4agent_worker-net"
      FunctionPool__ContainerManager__BrokerHostForWorkers: "broker"
      FunctionPool__ContainerManager__BrokerPortForWorkers: "7000"
      FunctionPool__ContainerManager__AgentBrokerUrl: "${AGENT_BROKER_URL:-http://broker:5000}"
      FunctionPool__ContainerManager__MaxContainersPerType: "3"
      # Worker image configs
      FunctionPool__ContainerManager__WorkerImages__file-worker__Image: "bricks4agent-file-worker:latest"
      FunctionPool__ContainerManager__WorkerImages__file-worker__MemoryLimit: "256m"
      FunctionPool__ContainerManager__WorkerImages__line-worker__Image: "bricks4agent-line-worker:latest"
      FunctionPool__ContainerManager__WorkerImages__line-worker__MemoryLimit: "256m"
      FunctionPool__ContainerManager__WorkerImages__agent__Image: "bricks4agent-agent:latest"
      FunctionPool__ContainerManager__WorkerImages__agent__MemoryLimit: "512m"
      # broker-spawned agents are sealed on the internal-only agent network (§13.1)
      FunctionPool__ContainerManager__WorkerImages__agent__NetworkName: "bricks4agent_agent-net"
    ports:
      - "${BROKER_PORT:-5000}:5000"
    volumes:
      - broker-data:/data
      # Mount Docker socket so broker can spawn worker containers
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - control-net
      - worker-net
      - agent-net

  # ── File Worker ──
  file-worker:
    image: bricks4agent-file-worker:latest
    build:
      context: ../../..
      dockerfile: packages/csharp/workers/file-worker/Containerfile
    depends_on:
      - broker
    environment:
      WORKER_Worker__BrokerHost: "broker"
      WORKER_Worker__BrokerPort: "7000"
      WORKER_Worker__MaxConcurrent: "4"
      WORKER_Worker__SandboxRoot: "/workspace"
      WORKER_Worker__Auth__WorkerType: "file-worker"
      WORKER_Worker__Auth__KeyId: "${FILE_WORKER_AUTH_KEY_ID:-file-worker-dev-key}"
      WORKER_Worker__Auth__SharedSecret: "${FILE_WORKER_AUTH_SHARED_SECRET:-file-worker-dev-shared-secret}"
    volumes:
      - ../../..:/workspace:ro
    restart: "on-failure:5"
    networks:
      - worker-net

  # ── LINE Worker ──
  line-worker:
    image: bricks4agent-line-worker:latest
    build:
      context: ../../..
      dockerfile: packages/csharp/workers/line-worker/Containerfile
    depends_on:
      - broker
    environment:
      WORKER_Worker__BrokerHost: "broker"
      WORKER_Worker__BrokerPort: "7000"
      WORKER_Worker__MaxConcurrent: "4"
      WORKER_Worker__Auth__WorkerType: "line-worker"
      WORKER_Worker__Auth__KeyId: "${LINE_WORKER_AUTH_KEY_ID:-line-worker-dev-key}"
      WORKER_Worker__Auth__SharedSecret: "${LINE_WORKER_AUTH_SHARED_SECRET:-line-worker-dev-shared-secret}"
      WORKER_Broker__ApiUrl: "http://broker:5000"
      WORKER_Line__ChannelAccessToken: "${LINE_CHANNEL_ACCESS_TOKEN}"
      WORKER_Line__ChannelSecret: "${LINE_CHANNEL_SECRET}"
      WORKER_Line__DefaultRecipientId: "${LINE_DEFAULT_RECIPIENT_ID}"
      WORKER_Line__AllowedUserIds: "${LINE_ALLOWED_USER_IDS}"
      WORKER_Line__WebhookHost: "0.0.0.0"
      WORKER_Line__WebhookPort: "19090"
    ports:
      - "${LINE_WEBHOOK_PORT:-19090}:19090"
    restart: "on-failure:5"
    networks:
      - worker-net

  # ── Execution Adapter Worker (§18.1) ──
  # Profile-gated: only starts with `--profile adapters` so the default governed
  # stack test is unaffected. Trusted execution node — hardened per §13.2 but,
  # unlike the agent, may write the workspace (it IS the mediated write path) and
  # has egress (build/test restore). The agent still cannot reach it directly;
  # only the broker dispatches repo.patch.apply / build.test.run to it.
  execution-adapter-worker:
    image: bricks4agent-execution-adapter-worker:latest
    profiles: ["adapters"]
    build:
      context: ../../..
      dockerfile: packages/csharp/workers/execution-adapter-worker/Containerfile
    depends_on:
      - broker
    environment:
      WORKER_Worker__BrokerHost: "broker"
      WORKER_Worker__BrokerPort: "7000"
      WORKER_Worker__MaxConcurrent: "2"
      WORKER_Worker__SandboxRoot: "/workspace"
      WORKER_Worker__EvidenceRoot: "/tmp/b4a-evidence"
      WORKER_Worker__Auth__WorkerType: "execution-adapter-worker"
      WORKER_Worker__Auth__KeyId: "${EXEC_ADAPTER_AUTH_KEY_ID:-exec-adapter-dev-key}"
      WORKER_Worker__Auth__SharedSecret: "${EXEC_ADAPTER_AUTH_SHARED_SECRET:-exec-adapter-dev-shared-secret}"
      HOME: "/tmp"
    volumes:
      # A fixture/throwaway workspace by default — NOT the real repo — so an applied
      # patch never mutates the source tree. Override via ADAPTER_WORKSPACE.
      - "${ADAPTER_WORKSPACE:-./adapter-workspace}:/workspace"
    restart: "on-failure:5"
    # ── OS-level hardening (design §13.2) ── no docker socket; non-root uid 10004
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    networks:
      - worker-net   # broker dispatch + egress (build/test restore)

  # ── Agent ──
  agent:
    image: bricks4agent-agent:latest
    build:
      context: ../../..
      dockerfile: tools/agent/Containerfile
    depends_on:
      - broker
    environment:
      BROKER_URL: "http://broker:5000"
      BROKER_PUB_KEY: "${BROKER_ECDH_PUBLIC_KEY_BASE64:-MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEvFpkMbvHNTcG/j/LqHsJnff4B5c/9ouqVGfv1qzA/mIin/ppHzQ9Vd+7RfXiJsa5SRqTFuTUeb7pOXS0SrhVpQ==}"
      BROKER_PRINCIPAL_ID: "${BROKER_PRINCIPAL_ID:-prn_podman_dev}"
      BROKER_TASK_ID: "${BROKER_TASK_ID:-task_podman_dev}"
      BROKER_ROLE_ID: "${BROKER_ROLE_ID:-role_reader}"
      BROKER_WAIT_FOR_HEALTH: "1"
      BROKER_WAIT_TIMEOUT_SECONDS: "90"
      AGENT_PROJECT_ROOT: "/workspace"
      AGENT_MODEL: "${STACK_MODEL:-stack-test-model}"
      AGENT_MAX_ITERATIONS: "4"
      AGENT_NO_CONFIRM: "1"
      AGENT_VERBOSE: "${AGENT_VERBOSE:-0}"
      AGENT_LINE_LISTEN: "${AGENT_LINE_LISTEN:-0}"
      AGENT_LINE_POLL_INTERVAL: "${AGENT_LINE_POLL_INTERVAL:-3000}"
      AGENT_RUN: "${AGENT_RUN:-Reply with the exact text STACK_OK.}"
    volumes:
      - ../../..:/workspace
    restart: "no"
    # ── OS-level hardening (design §13) ──
    # The agent is the untrusted autonomous main: sandbox it. It already runs as
    # non-root (uid 10001) and needs no Linux capabilities.
    read_only: true                 # rootfs read-only; the /workspace bind mount stays writable
    tmpfs:
      - /tmp                        # writable scratch (os.tmpdir) on tmpfs, not the rootfs
    cap_drop:
      - ALL                         # drop every capability — none are needed
    security_opt:
      - no-new-privileges:true      # block setuid/setgid privilege escalation
    pids_limit: 256                 # cap process count (fork-bomb guard); seccomp = runtime default
    networks:
      # internal-only: the agent can reach the broker and nothing else (§13.1)
      - agent-net

# ── Network Isolation (design §13.1) ──
# agent-net:   broker + agent ONLY, marked `internal: true` so the agent has NO
#   gateway to the host/internet. The agent sits on this network ALONE, so it can
#   reach only the broker — it cannot egress on its own. This enforces "the
#   container reaches only the control plane". (The agent has no published ports,
#   so sealing it on an internal network is safe; containers that publish ports —
#   broker, mock LLM — stay on bridge networks where ingress is reliable.)
# control-net: broker + LLM, bridge. Broker reaches the model provider here.
# worker-net:  broker + workers, bridge. Broker keeps egress and host
#   port-publishing via its bridge memberships while the agent stays sealed.
networks:
  agent-net:
    name: bricks4agent_agent-net
    driver: bridge
    internal: true
  control-net:
    name: bricks4agent_control-net
    driver: bridge
  worker-net:
    name: bricks4agent_worker-net
    driver: bridge

volumes:
  broker-data:
