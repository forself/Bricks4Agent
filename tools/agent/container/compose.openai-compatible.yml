services:
  mock-openai:
    build:
      context: ../../..
      dockerfile: tools/agent/container/mock-openai.Containerfile
    environment:
      PORT: "8080"
      MOCK_MODEL: "${STACK_MODEL:-openai-proxy-dev}"
      MOCK_RESPONSE_TEXT: "${STACK_RESPONSE_TEXT:-STACK_OK}"
      EXPECTED_API_KEY: "${OPENAI_API_KEY:-dev-openai-key}"
    ports:
      - "${STACK_LLM_PORT:-8080}:8080"

  broker:
    build:
      context: ../../..
      dockerfile: packages/csharp/broker/Containerfile
    depends_on:
      - mock-openai
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:5000"
      Database__Path: "/data/broker.db"
      Broker__ScopedToken__Secret: "${BROKER_SCOPED_TOKEN_SECRET:-THIS_IS_A_DEVELOPMENT_ONLY_SCOPED_TOKEN_SECRET_32B}"
      Broker__Encryption__MasterKeyBase64: "${BROKER_MASTER_KEY_BASE64:-BEjqln/N4iLKmxh5ltylZvLxax+iQc+m9T+1BkAz1+w=}"
      Broker__Encryption__EcdhPrivateKeyBase64: "${BROKER_ECDH_PRIVATE_KEY_BASE64:-MIGHAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBG0wawIBAQQg+oxf+eIdOKgNveCoXr8rgrh/9NAtuBSto3XjXjajsW+hRANCAAS8WmQxu8c1Nwb+P8uoewmd9/gHlz/2i6pUZ+/WrMD+YiKf+mkfND1V37tF9eImxrlJGpMW5NR5vuk5dLRKuFWl}"
      LlmProxy__Enabled: "true"
      LlmProxy__Provider: "openai"
      LlmProxy__BaseUrl: "http://mock-openai:8080"
      LlmProxy__ApiKey: "${OPENAI_API_KEY:-dev-openai-key}"
      LlmProxy__ApiFormat: "${OPENAI_API_FORMAT:-responses}"
      LlmProxy__DefaultModel: "${STACK_MODEL:-openai-proxy-dev}"
      LlmProxy__AllowModelOverride: "false"
      LlmProxy__SupportsToolCalling: "true"
      LlmProxy__StreamingEnabled: "false"
      LlmProxy__TimeoutSeconds: "60"
      DevelopmentSeed__Enabled: "true"
      DevelopmentSeed__PrincipalId: "${BROKER_PRINCIPAL_ID:-prn_openai_dev}"
      DevelopmentSeed__DisplayName: "OpenAI Compatible Development Principal"
      DevelopmentSeed__ActorType: "AI"
      DevelopmentSeed__TaskId: "${BROKER_TASK_ID:-task_openai_dev}"
      DevelopmentSeed__TaskType: "analysis"
      DevelopmentSeed__AssignedRoleId: "${BROKER_ROLE_ID:-role_reader}"
      DevelopmentSeed__RuntimeDescriptor: >-
        {"llm":{"default_model":"${STACK_MODEL:-openai-proxy-dev}","allow_model_override":false,"supports_tool_calling":true,"streaming_enabled":false},"capability_grants":[{"capability_id":"file.read","scope":{"paths":["/workspace"],"routes":["read_file"]},"quota":-1}]}
    ports:
      - "${BROKER_PORT:-5001}:5000"
    volumes:
      - broker-openai-data:/data

  agent:
    build:
      context: ../../..
      dockerfile: tools/agent/Containerfile
    depends_on:
      - broker
    environment:
      BROKER_URL: "http://broker:5000"
      BROKER_PUB_KEY: "${BROKER_ECDH_PUBLIC_KEY_BASE64:-MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEvFpkMbvHNTcG/j/LqHsJnff4B5c/9ouqVGfv1qzA/mIin/ppHzQ9Vd+7RfXiJsa5SRqTFuTUeb7pOXS0SrhVpQ==}"
      BROKER_PRINCIPAL_ID: "${BROKER_PRINCIPAL_ID:-prn_openai_dev}"
      BROKER_TASK_ID: "${BROKER_TASK_ID:-task_openai_dev}"
      BROKER_ROLE_ID: "${BROKER_ROLE_ID:-role_reader}"
      BROKER_WAIT_FOR_HEALTH: "1"
      BROKER_WAIT_TIMEOUT_SECONDS: "90"
      AGENT_PROJECT_ROOT: "/workspace"
      AGENT_MODEL: "${STACK_MODEL:-openai-proxy-dev}"
      AGENT_MAX_ITERATIONS: "4"
      AGENT_NO_CONFIRM: "1"
      AGENT_VERBOSE: "${AGENT_VERBOSE:-0}"
      AGENT_RUN: "${AGENT_RUN:-Reply with the exact text STACK_OK.}"
    volumes:
      - ../../..:/workspace
    restart: "no"

volumes:
  broker-openai-data:
