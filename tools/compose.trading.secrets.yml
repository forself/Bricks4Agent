# Docker secrets overlay for compose.trading.yml（#1 secrets management）
#
# 用途：把 Alpaca/Binance/LLM API 機密改成 Docker secrets（檔案掛載）而非 plain env，
# 避免 `docker inspect`、`/proc/.../environ`、cron job env dump 直接看到值。
#
# 用法：
#   1. 在 tools/secrets/ 放幾個檔案（每個檔案一個機密的純文字內容、不帶引號）：
#        tools/secrets/alpaca_api_key.txt
#        tools/secrets/alpaca_api_secret.txt
#        tools/secrets/binance_api_key.txt
#        tools/secrets/binance_api_secret.txt
#        tools/secrets/llm_api_key.txt
#        tools/secrets/broker_master_key.txt          # base64 32 bytes
#        tools/secrets/broker_scoped_token_secret.txt  # 任意長字串
#   2. tools/secrets/ 已加進 .gitignore（在主 .gitignore：_ref/ 那條後再補）
#   3. 起服務時加 -f 旗標：
#        docker compose --env-file tools/.env.trading \
#          -f tools/compose.trading.yml \
#          -f tools/compose.trading.secrets.yml \
#          up -d
#
# 邏輯：每個機密 mount 到 /run/secrets/{name}，container 用 *_FILE 環境變數指過去。
# SecretConfig.GetSecret() 會優先讀 *File 指向的檔案、沒設就 fallback 到原本的 env 直接值
# （所以這 overlay 純加值、不破舊 dev 流程）。

secrets:
  alpaca_api_key:
    file: ./secrets/alpaca_api_key.txt
  alpaca_api_secret:
    file: ./secrets/alpaca_api_secret.txt
  binance_api_key:
    file: ./secrets/binance_api_key.txt
  binance_api_secret:
    file: ./secrets/binance_api_secret.txt
  bingx_perp_api_key:
    file: ./secrets/bingx_perp_api_key.txt
  bingx_perp_api_secret:
    file: ./secrets/bingx_perp_api_secret.txt
  line_channel_access_token:
    file: ./secrets/line_channel_access_token.txt
  line_channel_secret:
    file: ./secrets/line_channel_secret.txt
  line_default_recipient_id:
    file: ./secrets/line_default_recipient_id.txt
  llm_api_key:
    file: ./secrets/llm_api_key.txt
  broker_master_key:
    file: ./secrets/broker_master_key.txt
  broker_scoped_token_secret:
    file: ./secrets/broker_scoped_token_secret.txt

services:
  broker:
    secrets:
      - llm_api_key
      - broker_master_key
      - broker_scoped_token_secret
    environment:
      # 這些 *File env 指向 secret 在 container 內的 mount 點，SecretConfig 會解析
      LlmProxy__ApiKeyFile: /run/secrets/llm_api_key
      Broker__Encryption__MasterKeyBase64File: /run/secrets/broker_master_key
      Broker__ScopedToken__SecretFile: /run/secrets/broker_scoped_token_secret
      # Artifact 下載 API 簽章密鑰(值在 .env.trading、此處只做 ${VAR} 映射)。
      # load-bearing:缺這行乾淨重部署後簽章下載會壞。2026-05-30 從 VPS 本地改動收回 git。
      ARTIFACT_DOWNLOAD_SIGNING_SECRET: ${ARTIFACT_DOWNLOAD_SIGNING_SECRET}

  trading-worker:
    secrets:
      - alpaca_api_key
      - alpaca_api_secret
      - binance_api_key
      - binance_api_secret
      - bingx_perp_api_key
      - bingx_perp_api_secret
    environment:
      # 注意：trading-worker 用 .AddEnvironmentVariables("WORKER_") 讀 env，
      # 所以這些 *File 變數必須加 WORKER_ 前綴才會被 IConfiguration 看到。
      # broker 不加前綴是因為它用預設 builder（讀所有 env）。
      WORKER_Worker__Trading__Alpaca__ApiKeyFile:    /run/secrets/alpaca_api_key
      WORKER_Worker__Trading__Alpaca__ApiSecretFile: /run/secrets/alpaca_api_secret
      WORKER_Worker__Trading__Binance__ApiKeyFile:    /run/secrets/binance_api_key
      WORKER_Worker__Trading__Binance__ApiSecretFile: /run/secrets/binance_api_secret
      WORKER_Worker__Trading__BingxPerp__ApiKeyFile:    /run/secrets/bingx_perp_api_key
      WORKER_Worker__Trading__BingxPerp__ApiSecretFile: /run/secrets/bingx_perp_api_secret

  line-worker:
    secrets:
      - line_channel_access_token
      - line_channel_secret
      - line_default_recipient_id
    environment:
      # 同 trading-worker 規則：line-worker 用 .AddEnvironmentVariables("WORKER_")，
      # 所以 *File 也要 WORKER_ 前綴才會被 IConfiguration 看到。
      WORKER_Line__ChannelAccessTokenFile: /run/secrets/line_channel_access_token
      WORKER_Line__ChannelSecretFile:      /run/secrets/line_channel_secret
      WORKER_Line__DefaultRecipientIdFile: /run/secrets/line_default_recipient_id
