# 自動移轉階段⑤:暖備 broker + 見證(etcd quorum)—— 用「真 b4a-broker」驗證 EtcdLeaderElection。
# 對應 failover-sim(那是 brokersim 模擬;這個是真 broker)。本地、隔離(-p b4aha)、不碰 prod。
#
# 跑法:
#   docker compose -p b4aha -f tools/ha/docker-compose.ha.yml up -d
#   docker logs b4aha-broker-a 2>&1 | grep "\[cluster\]"   # 看誰是 PRIMARY
#   docker kill b4aha-broker-a                              # 殺主 → broker-b 應接手
#   docker compose -p b4aha -f tools/ha/docker-compose.ha.yml down
#
# 注意:此處 master key 是 throwaway 測試值、DB 是 ephemeral(無 Litestream)——只驗「選主/接手」機制,
#       不驗狀態複製(那是 runbook 的 Litestream + 真部署的事)。真部署見 tools/ha/README.md。
name: b4aha
networks:
  net:
    name: b4aha-net

services:
  etcd1:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: b4aha-etcd1
    networks: [net]
    command: >
      etcd --name etcd1 --initial-cluster-token b4aha --initial-cluster-state new
      --initial-cluster etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      --listen-peer-urls http://0.0.0.0:2380 --initial-advertise-peer-urls http://etcd1:2380
      --listen-client-urls http://0.0.0.0:2379 --advertise-client-urls http://etcd1:2379
  etcd2:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: b4aha-etcd2
    networks: [net]
    command: >
      etcd --name etcd2 --initial-cluster-token b4aha --initial-cluster-state new
      --initial-cluster etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      --listen-peer-urls http://0.0.0.0:2380 --initial-advertise-peer-urls http://etcd2:2380
      --listen-client-urls http://0.0.0.0:2379 --advertise-client-urls http://etcd2:2379
  etcd3:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: b4aha-etcd3
    networks: [net]
    command: >
      etcd --name etcd3 --initial-cluster-token b4aha --initial-cluster-state new
      --initial-cluster etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      --listen-peer-urls http://0.0.0.0:2380 --initial-advertise-peer-urls http://etcd3:2380
      --listen-client-urls http://0.0.0.0:2379 --advertise-client-urls http://etcd3:2379

  broker-a:
    image: b4a-broker:latest
    container_name: b4aha-broker-a
    networks: [net]
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:5000"
      Database__Path: "/data/broker.db"
      Broker__Encryption__MasterKeyBase64: "bsW2LBZrDoD1TH6KjI4VneHTHt/kPHs7UwGzAXphwe8="
      Cluster__EtcdEndpoints: "etcd1:2379,etcd2:2379,etcd3:2379"
      Cluster__NodeId: "broker-a"
      Cluster__LeaseTtlSeconds: "10"
    depends_on: [etcd1, etcd2, etcd3]

  broker-b:
    image: b4a-broker:latest
    container_name: b4aha-broker-b
    networks: [net]
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:5000"
      Database__Path: "/data/broker.db"
      Broker__Encryption__MasterKeyBase64: "bsW2LBZrDoD1TH6KjI4VneHTHt/kPHs7UwGzAXphwe8="
      Cluster__EtcdEndpoints: "etcd1:2379,etcd2:2379,etcd3:2379"
      Cluster__NodeId: "broker-b"
      Cluster__LeaseTtlSeconds: "10"
    depends_on: [etcd1, etcd2, etcd3]
