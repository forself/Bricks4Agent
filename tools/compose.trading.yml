# Quantitative Trading Stack
#
# 使用方式:
#   1. cp tools/.env.trading.example tools/.env.trading
#   2. 填入 API keys
#   3. docker compose -f tools/compose.trading.yml --env-file tools/.env.trading up -d --build
#
# Dashboard:  http://localhost:5000
# 停止:       docker compose -f tools/compose.trading.yml down

name: b4a-trading

services:
  # ── Broker（控制中心 + API 閘道）────────────────────────────────────
  broker:
    build:
      context: ..
      dockerfile: packages/csharp/broker/Containerfile.monitor
    image: b4a-broker:latest
    container_name: b4a-broker
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:5000"
      Database__Path: "/data/broker.db"

      # Dev-only：設成 buy 或 sell 會強制 AutoTrader 覆蓋訊號 + 跳 confidence 門檻。
      # 預設空字串 = 走原本訊號驅動邏輯。**只在 paper 帳號用、用完務必 unset**。
      AUTOTRADER_DEV_FORCE_ACTION: "${AUTOTRADER_DEV_FORCE_ACTION:-}"

      # AutoTrader 信心度門檻（[0,1]）。預設 0.5；composite + 三道過濾鏈會把 buy/sell
      # 訊號擋下來，paper 階段可調 0.45-0.55 觀察出單頻率，正式上線再拉回 0.6+。
      AUTOTRADER_MIN_CONFIDENCE: "${AUTOTRADER_MIN_CONFIDENCE:-}"

      # Portfolio circuit breaker：當日從 peak 跌幅超過此 % 時，該 exchange 暫停下新單，
      # 避免單日連環失誤把帳戶打殘。預設 8%。peak 在 UTC 午夜重置。0 / 負數 / garbage → 走預設。
      AUTOTRADER_MAX_PORTFOLIO_DD_PCT: "${AUTOTRADER_MAX_PORTFOLIO_DD_PCT:-}"

      # Position protection（B4a）——每 cycle 對所有部位跑一次：
      #  - INITIAL_SL_PCT (預設 5)：開倉時 SL 距離 entry 的 %（軟 SL，broker 端監控）
      #  - PARTIAL_EXIT_PCT (預設 5)：漲超此 % 觸發部分平倉（一次）
      #  - PARTIAL_EXIT_RATIO (預設 0.5)：部分平倉的 qty 比例 ∈ (0, 1)
      #  - BREAKEVEN_TRIGGER_PCT (預設 3)：漲超此 % SL 移到 entry × (1 + buffer%)
      #  - BREAKEVEN_BUFFER_PCT (預設 0.5)：BE 上方留多少 buffer 避免價差掃損
      AUTOTRADER_INITIAL_SL_PCT: "${AUTOTRADER_INITIAL_SL_PCT:-}"
      AUTOTRADER_PARTIAL_EXIT_PCT: "${AUTOTRADER_PARTIAL_EXIT_PCT:-}"
      AUTOTRADER_PARTIAL_EXIT_RATIO: "${AUTOTRADER_PARTIAL_EXIT_RATIO:-}"
      AUTOTRADER_BREAKEVEN_TRIGGER_PCT: "${AUTOTRADER_BREAKEVEN_TRIGGER_PCT:-}"
      AUTOTRADER_BREAKEVEN_BUFFER_PCT: "${AUTOTRADER_BREAKEVEN_BUFFER_PCT:-}"

      # A2 ATR-based SL（opt-in）— >0 啟用、0 / 沒設 → 走 fixed AUTOTRADER_INITIAL_SL_PCT
      AUTOTRADER_ATR_SL_MULTIPLIER: "${AUTOTRADER_ATR_SL_MULTIPLIER:-}"
      AUTOTRADER_ATR_PERIOD: "${AUTOTRADER_ATR_PERIOD:-}"
      AUTOTRADER_ATR_INTERVAL: "${AUTOTRADER_ATR_INTERVAL:-}"

      # Internal bot auth：bot-node container 帶 X-Internal-Bot-Token 認證、broker 比對此 env
      BOT_INTERNAL_TOKEN: "${BOT_INTERNAL_TOKEN:-}"
      # 手機按鈕審核：bot-node 對 admin endpoints 帶 X-Internal-Bot-Admin-Token、broker 認此 env 賜 role_admin
      # 嚴格跟 user token 分離、不要重複（避免 prompt injection 拿 user token 偷敲 /admin/*）
      BOT_INTERNAL_ADMIN_TOKEN: "${BOT_INTERNAL_ADMIN_TOKEN:-}"

      # SL flush freeze（B3）——滑動視窗內若 SL hit ≥ threshold 次，自動 disable auto-trader、
      # 強制 user 手動按 /sl-flush/reset 復原。預設 3 次/60 分。
      AUTOTRADER_SL_FLUSH_THRESHOLD: "${AUTOTRADER_SL_FLUSH_THRESHOLD:-}"
      AUTOTRADER_SL_FLUSH_WINDOW_MINUTES: "${AUTOTRADER_SL_FLUSH_WINDOW_MINUTES:-}"

      # Perp 強平距離保護（Phase 4）：當 liquidation_distance_pct ≤ 此 % → emergency close
      # 整個部位（不論 SL 是否到）。預設 5%。實盤建議拉高到 8-10%（更保守）。
      AUTOTRADER_PERP_LIQ_EMERGENCY_PCT: "${AUTOTRADER_PERP_LIQ_EMERGENCY_PCT:-}"

      # Bracket SL（C）：true = 自動開倉時把 exchange-side stop_loss 直接 attach 到 BingX 部位，
      # broker downtime 也有保護。SL 距離用 AUTOTRADER_INITIAL_SL_PCT、高槓桿自動收緊。空 / 非 true → 關（走軟 SL）。
      AUTOTRADER_BRACKET_SL_ENABLED: "${AUTOTRADER_BRACKET_SL_ENABLED:-}"

      # Bracket TP（C）：開倉時帶 exchange-side take_profit 的距離 %（long 上方 / short 下方）。
      # 0 / 沒設 → 關（讓利潤跑、走 trailing）。跟 trailing 並存，誰先到誰先平。
      AUTOTRADER_BRACKET_TP_PCT: "${AUTOTRADER_BRACKET_TP_PCT:-}"
      # Bracket TP R:R 倍數（opt-in、優先於 TP_PCT）：TP 距離 = RR × 槓桿感知 SL 距離。
      # 例 2 = 賺賠比 2:1。0 / 沒設 → 退回固定 TP_PCT。
      AUTOTRADER_BRACKET_TP_RR: "${AUTOTRADER_BRACKET_TP_RR:-}"

      # Bracket SL sync（#1）：true = broker 移動軟 SL（BE/trailing）時，把 exchange 端 stop 也 cancel+replace
      # 到新價，downtime 也鎖利潤。**真錢危險：先在 demo 驗證 BingX stop 取代行為再開**。空 / 非 true → 關。
      AUTOTRADER_BRACKET_SL_SYNC_ENABLED: "${AUTOTRADER_BRACKET_SL_SYNC_ENABLED:-}"

      # 裸倉自動補 SL（#2）：true = 保護迴圈偵測「交易所沒掛任何 STOP」的倉、自動補一張到當前軟 SL 價。
      # **開啟會動到現有裸倉（含手動開的舊倉）**。空 / 非 true → 關。
      AUTOTRADER_RETROFIT_NAKED_SL: "${AUTOTRADER_RETROFIT_NAKED_SL:-}"

      # Regime filter gate（off / soft / strict）。strict = HighVol/Squeeze 全擋、Trending 擋反向
      # （TrendingDown 不開多 / TrendingUp 不開空）。**全域、影響所有 watch**。只擋開倉/加倉、不擋平倉。
      # 給逆勢均值回歸策略(rsi_stoch)在空頭少接刀;預設 off 不破壞既有行為。
      AUTOTRADER_REGIME_GATE_MODE: "${AUTOTRADER_REGIME_GATE_MODE:-}"

      # Lab / 排程回測（策略分析階段）。RunOnStart=true → broker 啟動就跑一輪（驗證/觸發用、跑完設回 false）。
      # 注意：MaxParallel / BacktestSymbols 不在這裡用 ${:-} 空字串覆寫（空 int 會讓 config binding crash、
      # 空字串也會蓋掉 code 的 22-symbol 預設）。要覆寫請給「非空」值或改 code 預設。
      Lab__RunOnStart: "${LAB_RUN_ON_START:-false}"

      Broker__ScopedToken__Secret: "${BROKER_SCOPED_TOKEN_SECRET}"
      Broker__Encryption__MasterKeyBase64: "${BROKER_MASTER_KEY_BASE64}"
      Broker__Encryption__EcdhPrivateKeyBase64: "${BROKER_ECDH_PRIVATE_KEY_BASE64}"

      # LLM（策略分析用，選填）
      LlmProxy__Enabled: "${LLM_ENABLED:-false}"
      LlmProxy__Provider: "openai-compatible"
      LlmProxy__BaseUrl: "${LLM_BASE_URL:-}"
      LlmProxy__ApiKey: "${LLM_API_KEY:-}"
      LlmProxy__DefaultModel: "${LLM_MODEL:-gemini-2.0-flash}"
      LlmProxy__SupportsToolCalling: "true"
      LlmProxy__TimeoutSeconds: "60"

      HighLevelLlm__Enabled: "${LLM_ENABLED:-false}"
      HighLevelLlm__Provider: "openai-compatible"
      HighLevelLlm__BaseUrl: "${LLM_BASE_URL:-}"
      HighLevelLlm__ApiKey: "${LLM_API_KEY:-}"
      HighLevelLlm__DefaultModel: "${LLM_MODEL:-gemini-2.0-flash}"
      HighLevelLlm__ApiFormat: "chat"
      HighLevelLlm__TimeoutSeconds: "60"

      Embedding__Enabled: "false"

      Notifications__Discord__WebhookUrl: "${DISCORD_WEBHOOK_URL:-}"
      Notifications__Line__Enabled: "${NOTIFICATIONS_LINE_ENABLED:-false}"
      # 申報資金錨定（per exchange）：risk rules 用 min(這個值, 實際 balance) 算 equity。
      # 賺到不會自動放寬風控，必須由人手動調這個 env 才會。0 = 用實際值。
      Risk__DeclaredCapital__Bingx: "${RISK_DECLARED_CAPITAL_BINGX:-0}"
      Risk__DeclaredCapital__Binance: "${RISK_DECLARED_CAPITAL_BINANCE:-0}"
      Risk__DeclaredCapital__Alpaca: "${RISK_DECLARED_CAPITAL_ALPACA:-0}"
      # appsettings.json 預設 AccessRoot=%LOCALAPPDATA%\\... 是 Windows 路徑、
      # Linux container 起來會炸 "must be an absolute path" 把整個 broker 健康度拉成 critical。
      # 改成 /data 下的子目錄、跟 broker.db 同一個 named volume、容器重建也不會丟。
      HighLevelCoordinator__AccessRoot: "/data/managed-workspaces"
      # RecipientId 不設、line-worker 用自己的 DefaultRecipientId（從 secret 檔讀）
      # Notifications__Line__RecipientId: "${NOTIFICATIONS_LINE_RECIPIENT:-}"

      DevelopmentSeed__Enabled: "true"
      DevelopmentSeed__PrincipalId: "prn_dashboard"
      DevelopmentSeed__DisplayName: "Dashboard Admin"
      DevelopmentSeed__ActorType: "Human"
      DevelopmentSeed__TaskId: "task_dashboard"
      DevelopmentSeed__TaskType: "admin"
      DevelopmentSeed__AssignedRoleId: "role_admin"
      DevelopmentSeed__RuntimeDescriptor: "{}"

      FunctionPool__Enabled: "true"
      FunctionPool__ListenPort: "7000"
      FunctionPool__BindAddress: "0.0.0.0"
      FunctionPool__StrictMode: "false"
      # 大量回測：單一 backtest（meta 策略 + walk-forward × 1000 bars）可能跑 >30s；且核心被打滿時
      # worker 一段時間沒有 frame 往返。30s 太緊會被誤判離線 → 整批 cascade。拉到 120s 容忍 compute burst。
      FunctionPool__DispatchTimeoutSeconds: "120"
      FunctionPool__MaxWorkers: "20"
      FunctionPool__HeartbeatTimeoutSeconds: "120"

      # ContainerManager: inspection-only mode so the dashboard's
      # Containers tab can read `docker ps` / `docker stats` for the
      # b4a-* containers spawned by compose.
      FunctionPool__ContainerManager__Enabled: "true"
      FunctionPool__ContainerManager__Runtime: "docker"
      # 注意：以下要寫實際 docker 網路名（見檔案末 networks.trading-net.name），
      # 不是 compose 的服務內參考名（"trading-net"）也不是預設 project-prefixed 名
      # （"b4a-trading_trading-net"）。寫錯會導致 broker spawn 容器時找不到網路。
      FunctionPool__ContainerManager__NetworkName: "b4a-trading-net"
      FunctionPool__ContainerManager__BrokerHostForWorkers: "broker"
      FunctionPool__ContainerManager__BrokerPortForWorkers: "7000"

      # Spawn-enabled worker images — ContainerManager can start these
      # on demand via POST /api/v1/workers/spawn (dashboard Spawn button).
      # The dashboard's /available-types endpoint reads this list.
      FunctionPool__ContainerManager__WorkerImages__quote-worker__Image: "b4a-quote-worker:latest"
      FunctionPool__ContainerManager__WorkerImages__quote-worker__MemoryLimit: "512m"
      FunctionPool__ContainerManager__WorkerImages__quote-worker__CpuLimit: "0.5"
      FunctionPool__ContainerManager__WorkerImages__trading-worker__Image: "b4a-trading-worker:latest"
      FunctionPool__ContainerManager__WorkerImages__trading-worker__MemoryLimit: "512m"
      FunctionPool__ContainerManager__WorkerImages__trading-worker__CpuLimit: "0.5"
      FunctionPool__ContainerManager__WorkerImages__risk-worker__Image: "b4a-risk-worker:latest"
      FunctionPool__ContainerManager__WorkerImages__risk-worker__MemoryLimit: "512m"
      FunctionPool__ContainerManager__WorkerImages__risk-worker__CpuLimit: "0.5"
      FunctionPool__ContainerManager__WorkerImages__strategy-worker__Image: "b4a-strategy-worker:latest"
      FunctionPool__ContainerManager__WorkerImages__strategy-worker__MemoryLimit: "1g"
      FunctionPool__ContainerManager__WorkerImages__strategy-worker__CpuLimit: "1.0"
      # Agent runtime（MVP-0，2026-05-01）— 給 /api/v1/agents/spawn 用。
      # workerType=agent 是 AgentEndpoints.cs 寫死的；image 名要對得上 docker build 的 tag。
      FunctionPool__ContainerManager__WorkerImages__agent__Image: "b4a-agent:latest"
      FunctionPool__ContainerManager__WorkerImages__agent__MemoryLimit: "256m"
      FunctionPool__ContainerManager__WorkerImages__agent__CpuLimit: "0.3"
    ports:
      - "5100:5000"
    volumes:
      - broker-data:/data
      # Docker socket mount so ContainerManager can query docker ps / stats for
      # auto-discovering b4a-* containers spawned by compose (not by broker itself).
      # Read-only is sufficient for inspection-only usage (ListManagedAsync + GetStatsAsync).
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # Docker socket 在 host 上 owned by root:docker (gid 112 on Ubuntu 24.04)，
    # broker 容器內的 broker user (uid 10002) 不在這個 group → 讀不到 socket →
    # ContainerManager 報「Container runtime unavailable」critical。
    # 加 host docker GID 進來、broker 就讀得到。不同 distro GID 不同，可用 env 覆蓋：
    #   .env.trading 加 DOCKER_GID=$(getent group docker | cut -d: -f3) 一次定義
    group_add:
      - "${DOCKER_GID:-112}"
    networks:
      - trading-net
    restart: unless-stopped

  # ── Quote Worker（報價 + K 線 + 技術指標）────────────────────────────
  quote-worker:
    build:
      context: ..
      dockerfile: packages/csharp/workers/quote-worker/Containerfile
    image: b4a-quote-worker:latest
    container_name: b4a-quote-worker
    environment:
      WORKER_Worker__BrokerHost: "broker"
      WORKER_Worker__BrokerPort: "7000"
      WORKER_Worker__Quote__FetchIntervalMinutes: "${QUOTE_FETCH_INTERVAL:-5}"
      WORKER_Worker__Quote__CryptoIds: "${QUOTE_CRYPTO_IDS:-bitcoin,ethereum,solana,dogecoin}"
      WORKER_Worker__Quote__StockSymbols: "${QUOTE_STOCK_SYMBOLS:-AAPL,MSFT,TSLA,NVDA,2330.TW,2317.TW,2454.TW,0050.TW}"
      # 深度回補 universe（Binance 符號）—— 大量策略分析用的歷史 K 線。啟動時分頁抓到目標深度、
      # 已達標就 skip（idempotent）。改這裡 + recreate quote-worker 就會自動補齊新增 symbol。
      WORKER_Worker__Quote__BackfillSymbols: "${QUOTE_BACKFILL_SYMBOLS:-BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT,AVAXUSDT,DOGEUSDT,DOTUSDT,LINKUSDT,LTCUSDT,TRXUSDT,ATOMUSDT,UNIUSDT,NEARUSDT,APTUSDT,ARBUSDT,OPUSDT,INJUSDT,SUIUSDT,FILUSDT,TIAUSDT}"
      WORKER_Worker__Quote__DbPath: "/data/quote.db"
    volumes:
      - quote-data:/data
    networks:
      - trading-net
    depends_on:
      - broker
    restart: unless-stopped

  # ── Strategy Worker（策略引擎）──────────────────────────────────────
  strategy-worker:
    build:
      context: ..
      dockerfile: packages/csharp/workers/strategy-worker/Containerfile
    image: b4a-strategy-worker:latest
    container_name: b4a-strategy-worker
    environment:
      WORKER_Worker__BrokerHost: "broker"
      WORKER_Worker__BrokerPort: "7000"
      # 併發容量：預設 4 太低 —— broker 大量回測一次派 MaxParallel(5) 個,撞到 4 就把 worker 標 Busy、
      # 其餘 job 全收「No available worker」秒失敗(這是大量回測 1580/1584 fail 的真因)。
      # 拉到 8 讓容量 > 派發量、不會 Busy。配 broker Lab:MaxParallel=5（留 1 核給 broker/系統）。
      WORKER_Worker__MaxConcurrent: "${STRATEGY_WORKER_MAX_CONCURRENT:-8}"
      WORKER_Worker__Strategy__Llm__Enabled: "${LLM_ENABLED:-false}"
      # 走 broker 的 /api/v1/llm-proxy/chat 集中代理（broker 端有 LLM_API_KEY 即可，
      # worker 不再需要 API key、也不直連上游）
      WORKER_Worker__Strategy__Llm__BrokerUrl: "http://broker:5000"
      WORKER_Worker__Strategy__Llm__Model: "${LLM_MODEL:-gemini-2.0-flash}"
    networks:
      - trading-net
    depends_on:
      - broker
    restart: unless-stopped

  # ── Risk Worker（風控）──────────────────────────────────────────────
  risk-worker:
    build:
      context: ..
      dockerfile: packages/csharp/workers/risk-worker/Containerfile
    image: b4a-risk-worker:latest
    container_name: b4a-risk-worker
    environment:
      WORKER_Worker__BrokerHost: "broker"
      WORKER_Worker__BrokerPort: "7000"
      WORKER_Worker__Risk__MaxPositionSize: "${RISK_MAX_POSITION:-10000}"
      WORKER_Worker__Risk__MaxPortfolioPct: "${RISK_MAX_PORTFOLIO_PCT:-25}"
      WORKER_Worker__Risk__MaxOrderSize: "${RISK_MAX_ORDER_SIZE:-5000}"
      WORKER_Worker__Risk__MaxDailyLoss: "${RISK_MAX_DAILY_LOSS:-1000}"
      WORKER_Worker__Risk__MaxDrawdownPct: "${RISK_MAX_DRAWDOWN:-10}"
      WORKER_Worker__Risk__MaxDailyTrades: "${RISK_MAX_DAILY_TRADES:-20}"
    networks:
      - trading-net
    depends_on:
      - broker
    restart: unless-stopped

  # ── Trading Worker（下單）───────────────────────────────────────────
  trading-worker:
    build:
      context: ..
      dockerfile: packages/csharp/workers/trading-worker/Containerfile
    image: b4a-trading-worker:latest
    container_name: b4a-trading-worker
    environment:
      WORKER_Worker__BrokerHost: "broker"
      WORKER_Worker__BrokerPort: "7000"
      WORKER_Worker__Trading__DbPath: "/data/trading.db"

      # Alpaca（美股）
      WORKER_Worker__Trading__Alpaca__Enabled: "${ALPACA_ENABLED:-false}"
      WORKER_Worker__Trading__Alpaca__ApiKey: "${ALPACA_API_KEY:-}"
      WORKER_Worker__Trading__Alpaca__ApiSecret: "${ALPACA_API_SECRET:-}"
      WORKER_Worker__Trading__Alpaca__IsPaper: "${ALPACA_IS_PAPER:-true}"

      # Binance（加密貨幣 spot）
      WORKER_Worker__Trading__Binance__Enabled: "${BINANCE_ENABLED:-false}"
      WORKER_Worker__Trading__Binance__ApiKey: "${BINANCE_API_KEY:-}"
      WORKER_Worker__Trading__Binance__ApiSecret: "${BINANCE_API_SECRET:-}"
      WORKER_Worker__Trading__Binance__IsTestnet: "${BINANCE_IS_TESTNET:-true}"

      # BingX 永續合約（USDT-M perpetual swap）
      WORKER_Worker__Trading__BingxPerp__Enabled: "${BINGX_PERP_ENABLED:-false}"
      WORKER_Worker__Trading__BingxPerp__ApiKey: "${BINGX_PERP_API_KEY:-}"
      WORKER_Worker__Trading__BingxPerp__ApiSecret: "${BINGX_PERP_API_SECRET:-}"
      WORKER_Worker__Trading__BingxPerp__IsDemo: "${BINGX_PERP_IS_DEMO:-true}"
    volumes:
      - trading-data:/data
    networks:
      - trading-net
    depends_on:
      - broker
    restart: unless-stopped

  # ── LINE Worker（Messaging API 推播 + webhook 回應）─────────────────
  # 開啟流程：
  #   1. tools/secrets/ 下放三個檔（access token / secret / default recipient userId）
  #   2. compose.trading.secrets.yml overlay 會把它們當 docker secret 掛進去
  #   3. broker 端設 Notifications__Line__Enabled=true 才會真的開始推
  # 不放 secret 檔的話、容器起來後 Program.cs 會 LogError 並提早退出，broker 那邊
  # LineNotificationService 會 worker_available=false、靜默 skip。
  line-worker:
    build:
      context: ..
      dockerfile: packages/csharp/workers/line-worker/Containerfile
    image: b4a-line-worker:latest
    container_name: b4a-line-worker
    environment:
      WORKER_Worker__BrokerHost: "broker"
      WORKER_Worker__BrokerPort: "7000"
      # InboundDispatcher 用、把 LINE 收到的訊息回 broker HTTP API；單純推播不會走這條路徑
      # 但設了 broker:5000 才能避免 stack trace 錯誤刷屏
      WORKER_Broker__ApiUrl: "http://broker:5000"
      WORKER_Line__WebhookHost: "0.0.0.0"
      WORKER_Line__WebhookPort: "5357"
      # Channel access token / secret / default recipient 透過 secrets overlay 注入
      # （見 tools/compose.trading.secrets.yml 的 line-worker block）
    networks:
      - trading-net
    depends_on:
      - broker
    restart: unless-stopped

networks:
  trading-net:
    name: b4a-trading-net
    driver: bridge

volumes:
  broker-data:
  quote-data:
  trading-data:
