# B4A bot-node — Sandboxed container（複用既有 claude bot sandbox profile）
#
# 跟 ../../claude/docker/compose.sandboxed.yml 同套 hardening：
#   1. b4a-trading-net only → 只能網路打到 broker、進不了 host LAN
#   2. cap_drop ALL + no-new-privileges → escape 路徑全砍
#   3. host.docker.internal / gateway.docker.internal → 127.0.0.1（防 host port 觸達）
#   4. read_only rootfs + tmpfs /tmp → 容器 fs 可寫的只有 ephemeral
#   5. mount access.json read-only → bot 不能改自己的權限白名單
#
# 用法（前提：b4a-trading-net 已存在、broker 在跑）：
#   cd C:\Users\USER\Desktop\AI_Project\discord-bots\bot-node\docker
#   docker compose -f compose.sandboxed.yml --env-file ../.env up -d --build
#
# 同時只能跑一個 bot 連同個 token、要先 stop claude bot：
#   docker compose -f ../../claude/docker/compose.sandboxed.yml down

name: b4a-bot-node

services:
  bot-node:
    image: b4a-bot-node:latest
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: b4a-bot-node
    restart: unless-stopped

    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - ACCESS_JSON_PATH=/app/access.json
      - BOT_PHASE=4
      - BROKER_URL=http://broker:5000
      # phase 3+：bot 透過此 token 認證跟 broker 之間、broker 端 BOT_INTERNAL_TOKEN env 要相符
      - BOT_INTERNAL_TOKEN=${BOT_INTERNAL_TOKEN}
      # claude code v2.1.126 在 rootless container 寫 /usr/local/lib/node_modules 會 EACCES、關 auto-update
      - DISABLE_AUTOUPDATER=1

    volumes:
      # access.json 唯讀 mount、bot 改不了自己的權限白名單
      - ../access.json:/app/access.json:ro
      # Claude Code 訂閱憑證 + plugin cache（吃你 Max 訂閱、不另外付 token 費）
      # 用 rw 因為 claude 會更新 session 紀錄、approved pairings 等。注意：跟既有 claude bot
      # 同份檔案、不要兩個 bot 同時跑（會搶 .credentials lock）。
      #
      # 路徑解析：
      #   Windows: $env:USERPROFILE = C:\Users\USER (host)
      #   Linux:   設 BOT_CLAUDE_HOME_DIR=/opt/b4a/data/bot-claude-home（owner uid 10001）
      #            預設 fallback /opt/b4a/data/bot-claude-home（VPS 標準位置）
      - ${BOT_CLAUDE_HOME_DIR:-${USERPROFILE:-/opt/b4a/data/bot-claude-home}}/.claude:/home/claude-user/.claude
      - ${BOT_CLAUDE_HOME_DIR:-${USERPROFILE:-/opt/b4a/data/bot-claude-home}}/.claude.json:/home/claude-user/.claude.json:ro

    networks:
      - b4a-trading-net

    extra_hosts:
      - "host.docker.internal:127.0.0.1"
      - "gateway.docker.internal:127.0.0.1"

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # 不開 read_only：claude code 會寫一些 cache 到 home（不是訂閱 token 那個檔）、
    # 全 readonly 會讓它 silent fail。cap_drop ALL + no-new-privileges + 網路隔離已經是
    # 現有 claude bot 同套防護等級。

networks:
  b4a-trading-net:
    external: true
